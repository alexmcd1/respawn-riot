<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stars Brawl — Zoku21</title>
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  html, body { background: #1a0a2e; color: #fff; }
  body { padding: 12px; }
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a0a2e;font-family:var(--font-sans);}
canvas{display:block;image-rendering:pixelated;}
#wrap{position:relative;width:640px;margin:0 auto;}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;}
.hud-bar{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 10px;gap:8px;}
.brawler-hud{background:rgba(0,0,0,0.55);border-radius:12px;padding:6px 10px;min-width:140px;}
.brawler-hud.right{text-align:right;}
.brawler-name{font-size:12px;font-weight:500;color:#fff;margin-bottom:3px;letter-spacing:.5px;}
.hp-track{background:rgba(255,255,255,0.2);border-radius:4px;height:8px;overflow:hidden;margin-bottom:3px;}
.hp-fill{height:100%;border-radius:4px;transition:width .2s;}
.super-track{background:rgba(255,255,255,0.15);border-radius:4px;height:5px;overflow:hidden;}
.super-fill{height:100%;border-radius:4px;background:#f1c40f;transition:width .2s;}
.vs-badge{background:rgba(0,0,0,0.5);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#fff;align-self:center;flex-shrink:0;}
.btn-row{position:absolute;bottom:10px;right:10px;display:flex;flex-direction:column;gap:6px;pointer-events:all;}
.action-btn{padding:8px 14px;border-radius:20px;border:none;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:.5px;font-family:var(--font-sans);}
.atk-btn{background:#e74c3c;color:#fff;}
.super-btn{background:#f1c40f;color:#1a0a2e;}
.super-btn:disabled{background:#555;color:#888;cursor:not-allowed;}
#menu{position:absolute;inset:0;background:rgba(10,5,25,0.95);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px;gap:10px;z-index:20;overflow-y:auto;}
#menu h1{font-size:22px;font-weight:500;color:#f1c40f;letter-spacing:2px;margin-bottom:2px;}
#menu p{font-size:12px;color:rgba(255,255,255,0.5);text-align:center;}
.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;}
.char-card{border-radius:14px;padding:10px 8px;text-align:center;cursor:pointer;border:2px solid transparent;transition:border-color .2s;position:relative;}
.char-card:hover{border-color:rgba(255,255,255,0.4);}
.char-card.picked{border-color:#f1c40f;}
.char-avatar-wrap{width:60px;height:60px;margin:0 auto 6px;position:relative;}
.char-cname{font-size:12px;font-weight:500;color:#fff;margin-bottom:2px;}
.char-type{font-size:10px;opacity:.7;color:#fff;margin-bottom:5px;}
.stat-row{display:flex;justify-content:center;gap:6px;font-size:10px;color:rgba(255,255,255,0.6);}
.stat-pill{background:rgba(255,255,255,0.12);border-radius:8px;padding:2px 7px;}
.start-btn{padding:11px 36px;border-radius:20px;border:none;background:#f1c40f;color:#1a0a2e;font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font-sans);letter-spacing:1px;margin-top:4px;}
.start-btn:disabled{opacity:.4;cursor:not-allowed;}
#result{position:absolute;inset:0;background:rgba(10,5,25,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:20;}
#result h2{font-size:28px;font-weight:500;color:#f1c40f;}
#result p{font-size:14px;color:rgba(255,255,255,0.6);}
.play-again{padding:10px 30px;border-radius:20px;border:none;background:#f1c40f;color:#1a0a2e;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-sans);}
.controls-hint{position:absolute;bottom:10px;left:10px;font-size:10px;color:rgba(255,255,255,0.35);line-height:1.6;pointer-events:none;}
</style>
</head>
<body>

<div id="wrap">
  <canvas id="c" width="640" height="420"></canvas>
  <div id="ui">
    <div class="hud-bar">
      <div class="brawler-hud" id="p1hud">
        <div class="brawler-name" id="p1name">—</div>
        <div class="hp-track"><div class="hp-fill" id="p1hp" style="width:100%;background:#27ae60"></div></div>
        <div class="super-track"><div class="super-fill" id="p1super" style="width:0%"></div></div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="brawler-hud right" id="p2hud">
        <div class="brawler-name" id="p2name">—</div>
        <div class="hp-track"><div class="hp-fill" id="p2hp" style="width:100%;background:#e74c3c"></div></div>
        <div class="super-track"><div class="super-fill" id="p2super" style="width:0%"></div></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="action-btn super-btn" id="super-btn" onclick="playerSuper()" disabled>SUPER</button>
      <button class="action-btn atk-btn" onclick="playerAttack()">ATTACK</button>
    </div>
    <div class="controls-hint">WASD / arrows — move<br>Click — attack<br>Space — super</div>
  </div>

  <div id="menu">
    <h1>STARS BRAWL</h1>
    <p>Pick your brawler — fight the AI!</p>
    <div class="char-grid" id="char-grid"></div>
    <button class="start-btn" id="start-btn" onclick="startGame()" disabled>SELECT A BRAWLER</button>
  </div>

  <div id="result">
    <h2 id="result-title">You Win!</h2>
    <p id="result-sub"></p>
    <button class="play-again" onclick="backToMenu()">Play Again</button>
  </div>
</div>

<script>
const BRAWLERS=[
  {id:'bull',name:'Bull',type:'Tank',color:'#c0392b',body:'#e74c3c',hp:2200,spd:2.2,atk:{name:'Double Barrel',dmg:420,range:120,spread:22,bullets:2,cooldown:28},sup:{name:'Bulldoze',dmg:800,effect:'charge',duration:60},superDesc:'Charge forward, knocking back enemies'},
  {id:'shelly',name:'Shelly',type:'Fighter',color:'#8e44ad',body:'#a855f7',hp:1600,spd:2.8,atk:{name:'Buckshot',dmg:320,range:180,spread:28,bullets:3,cooldown:20},sup:{name:'Super Shell',dmg:600,effect:'shockwave',duration:1},superDesc:'Massive shockwave blast'},
  {id:'colt',name:'Colt',type:'Sharpshooter',color:'#2980b9',body:'#3b82f6',hp:1200,spd:3.0,atk:{name:'Six-Shooter',dmg:200,range:260,spread:6,bullets:6,cooldown:18},sup:{name:'Bullet Storm',dmg:150,effect:'barrage',duration:60},superDesc:'Unleash a barrage of bullets'},
  {id:'nita',name:'Nita',type:'Fighter',color:'#16a085',body:'#1abc9c',hp:1800,spd:2.6,atk:{name:'Bear Paw',dmg:380,range:140,spread:14,bullets:1,cooldown:22},sup:{name:'Bear Summon',dmg:500,effect:'bear',duration:80},superDesc:'Summon a giant bear'},
  {id:'poco',name:'Poco',type:'Support',color:'#d35400',body:'#e67e22',hp:1500,spd:2.7,atk:{name:'Power Chord',dmg:280,range:200,spread:30,bullets:4,cooldown:20},sup:{name:'Healing Melody',dmg:0,effect:'heal',duration:1},superDesc:'Heal yourself for a lot of HP'},
  {id:'rosa',name:'Rosa',type:'Tank',color:'#27ae60',body:'#2ecc71',hp:2400,spd:2.1,atk:{name:'Uppercut',dmg:500,range:100,spread:0,bullets:1,cooldown:30},sup:{name:'Thorny Gloves',dmg:0,effect:'shield',duration:90},superDesc:'Gain a shield that absorbs damage'},
];

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=640,H=420;

const TILES=16;const TW=Math.floor(W/TILES);const TH=Math.floor(H/TILES-1);

let map=[],walls=new Set(),waterTiles=new Set(),bushTiles=new Set();
let player=null,enemy=null,projectiles=[],particles=[],bears=[];
let keys={},mouseX=320,mouseY=210,atkCooldown=0,aiTimer=0;
let gameRunning=false,playerChoice=null,animId=null;

function genMap(){
  map=[];walls=new Set();waterTiles=new Set();bushTiles=new Set();
  for(let y=0;y<TH;y++){
    map[y]=[];
    for(let x=0;x<TILES;x++){
      map[y][x]=0;
    }
  }
  const wallBlocks=[[2,2],[3,2],[13,2],[12,2],[2,TH-3],[3,TH-3],[13,TH-3],[12,TH-3],[7,3],[8,3],[7,TH-4],[8,TH-4],[4,6],[5,6],[10,6],[11,6],[4,TH-7],[5,TH-7],[10,TH-7],[11,TH-7],[7,7],[8,7],[7,TH-8],[8,TH-8]];
  wallBlocks.forEach(([x,y])=>{if(y>=0&&y<TH&&x>=0&&x<TILES){map[y][x]=1;walls.add(y*TILES+x);}});
  const waterSpots=[[0,4],[0,5],[0,6],[TILES-1,4],[TILES-1,5],[TILES-1,6]];
  waterSpots.forEach(([x,y])=>{if(y>=0&&y<TH){map[y][x]=2;waterTiles.add(y*TILES+x);}});
  const bushSpots=[[5,3],[6,3],[9,3],[5,TH-4],[9,TH-4],[6,5],[9,5]];
  bushSpots.forEach(([x,y])=>{if(y>=0&&y<TH){map[y][x]=3;bushTiles.add(y*TILES+x);}});
}

function tileAt(px,py){
  const tx=Math.floor(px/40),ty=Math.floor(py/40);
  return walls.has(ty*TILES+tx)||waterTiles.has(ty*TILES+tx);
}

function makeBrawler(data,isPlayer){
  return{
    ...data,
    x:isPlayer?60:W-60,y:H/2,
    maxHp:data.hp,curHp:data.hp,
    super:0,maxSuper:100,
    shielded:false,shieldTimer:0,
    bearSummoned:false,
    atkCd:0,
    isPlayer,
    vx:0,vy:0,
    facingX:isPlayer?1:-1,
    charging:false,chargeTimer:0,chargeVx:0,chargeVy:0,
    stunTimer:0,
    invTimer:0,
  };
}

function drawTile(x,y,type){
  const px=x*40,py=y*40;
  if(type===0){
    ctx.fillStyle='#2d5a1b';ctx.fillRect(px,py,40,40);
    ctx.fillStyle='#325f1e';
    for(let i=0;i<3;i++)ctx.fillRect(px+5+i*12,py+5+i*8,8,5);
  }else if(type===1){
    ctx.fillStyle='#7a6040';ctx.fillRect(px,py,40,40);
    ctx.fillStyle='#8b6d45';ctx.fillRect(px+2,py+2,36,36);
    ctx.fillStyle='#6b5235';ctx.fillRect(px,py,40,3);ctx.fillRect(px,py,3,40);
  }else if(type===2){
    ctx.fillStyle='#1a5276';ctx.fillRect(px,py,40,40);
    ctx.fillStyle='#1f618d';
    for(let i=0;i<2;i++)for(let j=0;j<2;j++)ctx.fillRect(px+5+i*18,py+8+j*16,12,6);
  }else if(type===3){
    ctx.fillStyle='#1d6b2a';ctx.fillRect(px,py,40,40);
    ctx.fillStyle='#27ae60';
    for(let i=0;i<4;i++)ctx.fillRect(px+3+i*9,py+3+(i%2)*6,8,18);
  }
}

function drawMap(){
  for(let y=0;y<TH;y++)for(let x=0;x<TILES;x++)drawTile(x,y,map[y][x]||0);
  ctx.fillStyle='#1a0a2e';ctx.fillRect(0,TH*40,W,H-TH*40);
}

function drawBrawler(b){
  ctx.save();
  const r=b===player?18:16;
  const bounce=gameRunning&&(Math.abs(b.vx)>0.1||Math.abs(b.vy)>0.1)?Math.sin(Date.now()*0.018)*2:0;
  const y=b.y+bounce;

  if(b.shielded){
    ctx.globalAlpha=0.3;
    ctx.fillStyle='#f1c40f';
    ctx.beginPath();ctx.arc(b.x,y,r+8,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(b.x,y+r-2,r*0.7,r*0.22,0,0,Math.PI*2);ctx.fill();

  const bodyColor=b.body||b.color;
  ctx.fillStyle=bodyColor;
  ctx.beginPath();ctx.arc(b.x,y,r,0,Math.PI*2);ctx.fill();

  ctx.fillStyle=b.color;
  ctx.beginPath();ctx.arc(b.x,y-r*0.15,r*0.85,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath();ctx.arc(b.x-r*0.2,y-r*0.3,r*0.35,0,Math.PI*2);ctx.fill();

  const ex=b.x+b.facingX*r*0.5;
  const ey=y-r*0.1;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(ex,ey,r*0.28,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(ex+b.facingX*2,ey+1,r*0.14,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath();ctx.arc(b.x-r*0.45,y+r*0.35,r*0.18,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(b.x+r*0.45,y+r*0.35,r*0.18,0,Math.PI*2);ctx.fill();

  const smileX=b.x,smileY=y+r*0.4;
  ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(smileX,smileY,r*0.22,0.1,Math.PI-0.1);ctx.stroke();

  const hpPct=b.curHp/b.maxHp;
  const bw=r*2+6;
  const bx=b.x-r-3,by=y-r-14;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx,by,bw,6);
  ctx.fillStyle=hpPct>0.5?'#27ae60':hpPct>0.25?'#f39c12':'#e74c3c';
  ctx.fillRect(bx,by,bw*hpPct,6);

  ctx.restore();
}

function drawBear(bear){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(bear.x,bear.y+14,14,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#7d4e1e';
  ctx.beginPath();ctx.arc(bear.x,bear.y,16,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6b3e14';
  ctx.beginPath();ctx.arc(bear.x-10,bear.y-12,8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bear.x+10,bear.y-12,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#9b6b30';
  ctx.beginPath();ctx.arc(bear.x,bear.y-3,13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(bear.x-5,bear.y-5,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bear.x+5,bear.y-5,3,0,Math.PI*2);ctx.fill();
  const hpPct=bear.hp/bear.maxHp;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bear.x-14,bear.y-28,28,5);
  ctx.fillStyle='#27ae60';ctx.fillRect(bear.x-14,bear.y-28,28*hpPct,5);
  ctx.restore();
}

function drawProjectile(p){
  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.rotate(p.angle||0);
  if(p.type==='super-barrage'){
    ctx.fillStyle='#3b82f6';
    ctx.fillRect(-8,-2,16,4);
    ctx.fillStyle='#f1c40f';
    ctx.fillRect(-8,-2,5,4);
  }else if(p.type==='super-shell'){
    ctx.fillStyle='#a855f7';
    ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f1c40f';
    ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
  }else{
    ctx.fillStyle=p.color||'#f1c40f';
    ctx.fillRect(-6,-3,12,6);
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.fillRect(-6,-1,4,2);
  }
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

function spawnParticles(x,y,color,count,speed){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=speed*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*3,life:20+Math.random()*15,maxLife:35,color});
  }
}

function fireProjectile(from,tx,ty,opts){
  const dx=tx-from.x,dy=ty-from.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const spread=(opts.spread||0)*Math.PI/180;
  const count=opts.bullets||1;
  const baseAngle=Math.atan2(dy,dx);
  from.facingX=dx>0?1:-1;
  for(let i=0;i<count;i++){
    const a=baseAngle+(i-(count-1)/2)*(spread/(Math.max(count-1,1)))+((Math.random()-0.5)*spread*0.3);
    const spd=opts.speed||7;
    projectiles.push({
      x:from.x,y:from.y,
      vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      dmg:opts.dmg,
      range:opts.range||200,
      traveled:0,
      fromPlayer:from.isPlayer,
      color:opts.color||from.body,
      type:opts.type||'normal',
      angle:a,
    });
  }
}

function playerAttack(){
  if(!gameRunning||!player||player.atkCd>0||player.stunTimer>0)return;
  const atk=player.atk;
  fireProjectile(player,mouseX,mouseY,{...atk,color:player.body});
  player.atkCd=atk.cooldown;
  player.super=Math.min(player.maxSuper,player.super+12);
  updateHUD();
  spawnParticles(player.x,player.y,player.body,4,3);
}

function playerSuper(){
  if(!gameRunning||!player||player.super<player.maxSuper||player.stunTimer>0)return;
  doSuper(player,enemy);
}

function doSuper(b,target){
  b.super=0;
  const eff=b.sup.effect;
  if(eff==='charge'){
    const dx=target.x-b.x,dy=target.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    b.charging=true;b.chargeTimer=b.sup.duration;b.chargeVx=(dx/d)*7;b.chargeVy=(dy/d)*7;
    spawnParticles(b.x,b.y,'#f39c12',12,5);
  }else if(eff==='shockwave'){
    fireProjectile(b,target.x,target.y,{dmg:b.sup.dmg,range:250,speed:9,bullets:1,spread:0,color:'#a855f7',type:'super-shell'});
    spawnParticles(b.x,b.y,'#a855f7',16,6);
  }else if(eff==='barrage'){
    b.chargeTimer=b.sup.duration;
    const interval=setInterval(()=>{
      if(!gameRunning||b.curHp<=0){clearInterval(interval);return;}
      const dx=target.x-b.x,dy=target.y-b.y;
      fireProjectile(b,target.x+Math.random()*40-20,target.y+Math.random()*40-20,{dmg:b.sup.dmg,range:300,speed:10,bullets:1,spread:0,color:'#3b82f6',type:'super-barrage'});
      spawnParticles(b.x,b.y,'#3b82f6',4,4);
    },120);
    setTimeout(()=>clearInterval(interval),b.sup.duration*16);
  }else if(eff==='bear'){
    const dx=target.x-b.x,dy=target.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    bears.push({x:b.x+dx/d*30,y:b.y+dy/d*30,hp:500,maxHp:500,owner:b,target,spd:2.5,atkCd:0,life:b.sup.duration});
  }else if(eff==='heal'){
    b.curHp=Math.min(b.maxHp,b.curHp+800);
    spawnParticles(b.x,b.y,'#27ae60',20,5);
  }else if(eff==='shield'){
    b.shielded=true;b.shieldTimer=b.sup.duration;
    spawnParticles(b.x,b.y,'#f1c40f',16,4);
  }
  updateHUD();
}

function updateBrawler(b,dx,dy){
  if(b.stunTimer>0){b.stunTimer--;return;}
  if(b.invTimer>0)b.invTimer--;
  if(b.atkCd>0)b.atkCd--;
  if(b.shieldTimer>0){b.shieldTimer--;if(b.shieldTimer===0)b.shielded=false;}

  if(b.charging){
    b.chargeTimer--;
    const nx=b.x+b.chargeVx,ny=b.y+b.chargeVy;
    if(!tileAt(nx,b.y)&&nx>15&&nx<W-15)b.x=nx;
    if(!tileAt(b.x,ny)&&ny>15&&ny<TH*40-15)b.y=ny;
    if(b.chargeTimer<=0)b.charging=false;
    const other=b.isPlayer?enemy:player;
    const dxx=other.x-b.x,dyy=other.y-b.y;
    if(Math.sqrt(dxx*dxx+dyy*dyy)<28&&other.invTimer===0){
      hitBrawler(other,b.sup.dmg,b);
      b.charging=false;b.chargeTimer=0;
    }
    return;
  }

  if(dx||dy){
    const spd=b.spd;
    const nx=b.x+dx*spd,ny=b.y+dy*spd;
    if(!tileAt(nx,b.y)&&nx>15&&nx<W-15)b.x=nx;else b.vx=0;
    if(!tileAt(b.x,ny)&&ny>15&&ny<TH*40-15)b.y=ny;else b.vy=0;
    b.vx=dx;b.vy=dy;
    if(dx!==0)b.facingX=dx>0?1:-1;
  }else{b.vx=0;b.vy=0;}
}

function hitBrawler(b,dmg,from){
  if(b.invTimer>0)return;
  if(b.shielded)dmg=Math.round(dmg*0.3);
  b.curHp=Math.max(0,b.curHp-dmg);
  b.invTimer=12;
  if(from){from.super=Math.min(from.maxSuper,from.super+8);}
  spawnParticles(b.x,b.y,'#fff',6,4);
  if(b.curHp===0)endGame(b.isPlayer?'lose':'win');
  updateHUD();
}

function updateProjectiles(){
  projectiles=projectiles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.traveled+=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(p.traveled>p.range)return false;
    if(tileAt(p.x,p.y)){spawnParticles(p.x,p.y,'#888',3,2);return false;}
    const target=p.fromPlayer?enemy:player;
    const dx=target.x-p.x,dy=target.y-p.y;
    if(Math.sqrt(dx*dx+dy*dy)<20){
      hitBrawler(target,p.dmg,p.fromPlayer?player:enemy);
      spawnParticles(p.x,p.y,p.color,8,4);
      return false;
    }
    return true;
  });
}

function updateBears(){
  bears=bears.filter(bear=>{
    bear.life--;
    if(bear.life<=0||bear.hp<=0)return false;
    const t=bear.target;
    const dx=t.x-bear.x,dy=t.y-bear.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    if(d>22){bear.x+=dx/d*bear.spd;bear.y+=dy/d*bear.spd;}
    else{
      bear.atkCd--;
      if(bear.atkCd<=0){
        hitBrawler(t,150,bear.owner);
        bear.atkCd=30;
      }
    }
    for(const p of projectiles){
      if(p.fromPlayer!==bear.owner.isPlayer){
        const dpx=bear.x-p.x,dpy=bear.y-p.y;
        if(Math.sqrt(dpx*dpx+dpy*dpy)<20){
          bear.hp-=p.dmg;
          spawnParticles(bear.x,bear.y,'#e74c3c',4,3);
        }
      }
    }
    return true;
  });
}

function aiUpdate(){
  if(!enemy||enemy.stunTimer>0||!gameRunning)return;
  aiTimer--;
  const dx=player.x-enemy.x,dy=player.y-enemy.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const pref=enemy.atk.range*0.6;
  let mdx=0,mdy=0;
  if(dist>pref+30){mdx=dx/dist;mdy=dy/dist;}
  else if(dist<pref-40){mdx=-dx/dist;mdy=-dy/dist;}
  else{mdx=(Math.random()-0.5)*0.5;mdy=(Math.random()-0.5)*0.5;}
  if(Math.random()<0.02){mdx=-mdy;mdy=mdx;}

  updateBrawler(enemy,mdx,mdy);

  if(aiTimer<=0&&enemy.atkCd===0&&dist<enemy.atk.range+20){
    const spread=enemy.atk.spread*Math.PI/180;
    const baseAngle=Math.atan2(player.y-enemy.y,player.x-enemy.x);
    const aim=baseAngle+(Math.random()-0.5)*spread*0.6;
    for(let i=0;i<enemy.atk.bullets;i++){
      const a=aim+(i-(enemy.atk.bullets-1)/2)*(spread/Math.max(enemy.atk.bullets-1,1));
      projectiles.push({x:enemy.x,y:enemy.y,vx:Math.cos(a)*6,vy:Math.sin(a)*6,dmg:enemy.atk.dmg,range:enemy.atk.range,traveled:0,fromPlayer:false,color:enemy.body,type:'normal',angle:a});
    }
    enemy.atkCd=enemy.atk.cooldown+8;
    enemy.super=Math.min(enemy.maxSuper,enemy.super+10);
    aiTimer=15+Math.floor(Math.random()*20);
  }
  if(enemy.super>=enemy.maxSuper&&Math.random()<0.018)doSuper(enemy,player);
}

function updateHUD(){
  if(!player||!enemy)return;
  document.getElementById('p1name').textContent=player.name;
  document.getElementById('p2name').textContent=enemy.name+' (AI)';
  document.getElementById('p1hp').style.width=(player.curHp/player.maxHp*100)+'%';
  document.getElementById('p2hp').style.width=(enemy.curHp/enemy.maxHp*100)+'%';
  document.getElementById('p1super').style.width=(player.super/player.maxSuper*100)+'%';
  document.getElementById('p2super').style.width=(enemy.super/enemy.maxSuper*100)+'%';
  const superBtn=document.getElementById('super-btn');
  superBtn.disabled=player.super<player.maxSuper;
  superBtn.textContent=player.super>=player.maxSuper?'SUPER! ⚡':'SUPER';
}

function gameLoop(){
  if(!gameRunning)return;
  ctx.clearRect(0,0,W,H);
  drawMap();

  let pdx=0,pdy=0;
  if(keys['w']||keys['arrowup'])pdy=-1;
  if(keys['s']||keys['arrowdown'])pdy=1;
  if(keys['a']||keys['arrowleft'])pdx=-1;
  if(keys['d']||keys['arrowright'])pdx=1;
  if(pdx&&pdy){pdx*=0.707;pdy*=0.707;}
  updateBrawler(player,pdx,pdy);
  aiUpdate();
  updateProjectiles();
  updateBears();
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});

  drawParticles();
  bears.forEach(drawBear);
  projectiles.forEach(drawProjectile);
  drawBrawler(enemy);
  drawBrawler(player);
  updateHUD();
  animId=requestAnimationFrame(gameLoop);
}

function endGame(result){
  gameRunning=false;
  if(animId)cancelAnimationFrame(animId);
  const overlay=document.getElementById('result');
  overlay.style.display='flex';
  document.getElementById('result-title').textContent=result==='win'?'You Win!':'You Lose!';
  document.getElementById('result-title').style.color=result==='win'?'#f1c40f':'#e74c3c';
  document.getElementById('result-sub').textContent=result==='win'?`You defeated ${enemy.name}!`:`${enemy.name} defeated you!`;
}

function startGame(){
  if(!playerChoice)return;
  document.getElementById('menu').style.display='none';
  document.getElementById('result').style.display='none';
  genMap();
  projectiles=[];particles=[];bears=[];
  player=makeBrawler(BRAWLERS.find(b=>b.id===playerChoice),true);
  const aiOptions=BRAWLERS.filter(b=>b.id!==playerChoice);
  enemy=makeBrawler(aiOptions[Math.floor(Math.random()*aiOptions.length)],false);
  player.x=80;player.y=H/2;
  enemy.x=W-80;enemy.y=H/2;
  aiTimer=30;
  gameRunning=true;
  updateHUD();
  gameLoop();
}

function backToMenu(){
  gameRunning=false;
  if(animId)cancelAnimationFrame(animId);
  document.getElementById('result').style.display='none';
  document.getElementById('menu').style.display='flex';
  renderMenu();
}

function renderMenu(){
  const grid=document.getElementById('char-grid');
  grid.innerHTML='';
  BRAWLERS.forEach(b=>{
    const card=document.createElement('div');
    card.className='char-card'+(playerChoice===b.id?' picked':'');
    card.style.background=b.color+'33';
    card.style.borderColor=playerChoice===b.id?'#f1c40f':'transparent';

    const atkStr=Math.round(b.atk.dmg*(b.atk.bullets||1)/30);
    const rangeStr=b.atk.range>200?'Long':b.atk.range>140?'Mid':'Short';

    card.innerHTML=`
      <div class="char-avatar-wrap"><svg width="60" height="60" viewBox="0 0 60 60">
        <ellipse cx="30" cy="52" rx="14" ry="5" fill="rgba(0,0,0,0.25)"/>
        <circle cx="30" cy="30" r="22" fill="${b.body}"/>
        <circle cx="30" cy="28" r="19" fill="${b.color}"/>
        <circle cx="22" cy="26" r="5" fill="white"/>
        <circle cx="38" cy="26" r="5" fill="white"/>
        <circle cx="23" cy="27" r="2.5" fill="#222"/>
        <circle cx="39" cy="27" r="2.5" fill="#222"/>
        <path d="M24 37 Q30 42 36 37" stroke="rgba(255,255,255,0.8)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="16" cy="18" r="8" fill="${b.color}"/>
        <circle cx="44" cy="18" r="8" fill="${b.color}"/>
        <circle cx="16" cy="18" r="5" fill="${b.body}"/>
        <circle cx="44" cy="18" r="5" fill="${b.body}"/>
      </svg></div>
      <div class="char-cname">${b.name}</div>
      <div class="char-type">${b.type}</div>
      <div class="stat-row">
        <span class="stat-pill">HP ${Math.round(b.hp/100)*100}</span>
        <span class="stat-pill">${rangeStr}</span>
      </div>
    `;
    card.onclick=()=>{
      playerChoice=b.id;
      document.querySelectorAll('.char-card').forEach(c=>{c.classList.remove('picked');c.style.borderColor='transparent';});
      card.classList.add('picked');card.style.borderColor='#f1c40f';
      const btn=document.getElementById('start-btn');
      btn.disabled=false;btn.textContent='FIGHT AS '+b.name.toUpperCase();
    };
    grid.appendChild(card);
  });
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;
});
canvas.addEventListener('click',()=>{if(gameRunning)playerAttack();});
window.addEventListener('keydown',e=>{
  if(!keys)return;
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '){e.preventDefault();playerSuper();}
});
window.addEventListener('keyup',e=>{if(keys)keys[e.key.toLowerCase()]=false;});

renderMenu();
</script>
