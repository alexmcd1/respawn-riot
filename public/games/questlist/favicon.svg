<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background with violet→fuchsia gradient (matches app logo) -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Checkmark for the completed task -->
  <path d="M14 18 L20 24 L30 14" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Three task lines: top is "completed" (full opacity), the rest fade -->
  <rect x="34" y="15" width="18" height="4" rx="2" fill="white" opacity="0.95"/>
  <rect x="14" y="30" width="38" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="14" y="42" width="38" height="4" rx="2" fill="white" opacity="0.45"/>
</svg>
