/* =========================================================================
   QuestList — single-file React prototype
   Features: CRUD, priorities, due dates, tags, projects, filters/search/sort,
             XP/levels/streaks/coins, confetti, sound FX (Web Audio),
             localStorage autosave + JSON import/export.
   ========================================================================= */
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* -------------------------- utilities & constants ------------------------- */
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
const todayISO = () => new Date().toISOString().slice(0,10);
const isoToday = todayISO();
const daysBetween = (a,b) => Math.floor((new Date(a)-new Date(b))/86400000);
const PRIORITIES = {
  low:    { label:'Low',    xp:5,  color:'text-sky-300',    ring:'ring-sky-400/40',    bg:'bg-sky-500/15',    dot:'bg-sky-400'},

  high:   { label:'High',   xp:25, color:'text-rose-300',   ring:'ring-rose-400/40',   bg:'bg-rose-500/15',   dot:'bg-rose-400'},
};
const LEVEL_XP = (lvl) => 80 + lvl*40; // XP required for level `lvl` -> lvl+1
const xpForLevel = (level) => { let total=0; for(let i=1;i<level;i++) total+=LEVEL_XP(i); return total; };
const levelForXP = (xp) => { let lvl=1, rem=xp; while(rem>=LEVEL_XP(lvl)){ rem-=LEVEL_XP(lvl); lvl++; } return { level:lvl, inLevel:rem, need:LEVEL_XP(lvl) }; };

const DEFAULT_STATE = {

  ],

  profile: { name:'', avatarDataUrl:'', friends:[] },
  settings: { soundOn:true, confettiOn:true },
  gmail: {
    accounts: [],          // array of per-inbox configs (see migrateGmailState comment)
    importedIds: {},       // { [accountId]: { [messageId|synKey]: taskId } } — namespaced per account
    clientId: '',          // shared OAuth client id (used by all OAuth-mode accounts)
    defaults: {            // applied as defaults when adding a new account
      sourceMode: 'browser',                    // 'browser' (Claude in Chrome) | 'oauth'
      query: 'in:inbox -category:promotions newer_than:7d',
      defaultProject: 'Inbox',
      defaultPriority: 'auto',
      autoTag: 'email',
    },
    schedule: { enabled: true, taskId: null, intervalMinutes: 15 }, // automated recurring sync
  },
};

// Each account in gmail.accounts:
// { id, label, email, gmailUserIndex, sourceMode, defaultProject, defaultPriority,
//   autoTag, query, enabled, lastSync }
function migrateGmailState(gmail){
  if(!gmail) return JSON.parse(JSON.stringify(DEFAULT_STATE.gmail));
  if(Array.isArray(gmail.accounts) && gmail.defaults){
    return { ...DEFAULT_STATE.gmail, ...gmail,
             defaults: { ...DEFAULT_STATE.gmail.defaults, ...(gmail.defaults||{}) },
             schedule: { ...DEFAULT_STATE.gmail.schedule, ...(gmail.schedule||{}) } };
  }
  // Old single-account shape → migrate to one default account.
  const account = {
    id: 'acc-' + uid(),
    label: 'Default',
    email: '',
    gmailUserIndex: 0,
    sourceMode: 'browser',
    defaultProject: gmail.defaultProject || 'Inbox',
    defaultPriority: gmail.defaultPriority || 'auto',
    autoTag: gmail.autoTag || 'email',
    query: gmail.query || 'in:inbox -category:promotions newer_than:7d',
    enabled: true,
    lastSync: gmail.lastSync || null,
  };
  const oldImported = gmail.importedIds && Object.keys(gmail.importedIds).length > 0
    ? gmail.importedIds : null;
  return {
    accounts: [account],
    importedIds: oldImported ? { [account.id]: oldImported } : {},
    clientId: gmail.clientId || '',
    defaults: {
      sourceMode: 'browser',
      query: account.query,
      defaultProject: account.defaultProject,
      defaultPriority: account.defaultPriority,
      autoTag: account.autoTag,
    },
    schedule: { enabled: false, taskId: null, intervalMinutes: 360 },
  };
}

const ACHIEVEMENTS = [
  { id:'first_task',  icon:'⚔️',  label:'First Quest',    desc:'Complete your first task',           check:(p,s)=> s.completedTotal>=1 },
  { id:'ten_tasks',   icon:'🗡️',  label:'Getting Going',  desc:'Complete 10 tasks',                  check:(p,s)=> s.completedTotal>=10 },
  { id:'fifty_tasks', icon:'🏆',  label:'Task Slayer',    desc:'Complete 50 tasks',                  check:(p,s)=> s.completedTotal>=50 },
  { id:'streak_3',    icon:'🔥',  label:'On a Roll',      desc:'3-day streak',                       check:(p)=> p.streak>=3 },
  { id:'streak_7',    icon:'⚡',  label:'Week Warrior',   desc:'7-day streak',                       check:(p)=> p.streak>=7 },
  { id:'streak_30',   icon:'🌙',  label:'Unstoppable',    desc:'30-day streak',                      check:(p)=> p.streak>=30 },
  { id:'level_5',     icon:'🌟',  label:'Apprentice',     desc:'Reach level 5',                      check:(p)=> levelForXP(p.xp).level>=5 },
  { id:'level_10',    icon:'💎',  label:'Adept',          desc:'Reach level 10',                     check:(p)=> levelForXP(p.xp).level>=10 },
  { id:'high_prio_5', icon:'🎯',  label:'Heavy Lifter',   desc:'Complete 5 high-priority tasks',     check:(p,s)=> s.highDone>=5 },
  { id:'coins_100',   icon:'🪙',  label:'Coin Hoarder',   desc:'Accumulate 100 coins',               check:(p)=> p.coins>=100 },

/* =============================== Gmail integration =============================== */

    { id:'d7', from:'Alex Ruiz <alex@designco.com>',         subject:'Draft mocks attached — need feedback',
      snippet:'I pushed the v3 home screen mocks to Figma. Can you take a look before our 1:1?',

    { id:'d8', from:'Calendly <noreply@calendly.com>',       subject:'New event booked: 30-min intro with Priya Shah',
      snippet:'Priya Shah has booked a 30-min intro on Friday at 2:00 PM. Calendar invite is on its way.',
      date:new Date(now-6*day).toString(),  labelIds:['INBOX'], internalDate:now-6*day },

};

function parseGmailFrom(s){
  if(!s) return { name:'', email:'' };
  const m = s.match(/^(.*?)<(.+?)>\s*$/);
  if(m) return { name: m[1].trim().replace(/^"|"$/g,''), email: m[2].trim() };
  return { name:'', email:s.trim() };
}

function inferPriorityFromEmail(email){
  const labels = email.labelIds || [];
  if(labels.includes('IMPORTANT') || labels.includes('STARRED')) return 'high';
  const blob = ((email.subject||'') + ' ' + (email.snippet||'')).toLowerCase();
  if(/\b(urgent|asap|action required|deadline|final reminder|eod|eow|blocker)\b/.test(blob)) return 'high';
  if(/\b(review|please|sign|approve|needs?|can you|follow up|respond|reply|feedback)\b/.test(blob)) return 'medium';
  return 'low';
}

function emailToTaskPatch(email, defaults){
  const from = parseGmailFrom(email.from);
  const priority = defaults.defaultPriority === 'auto'
    ? inferPriorityFromEmail(email)
    : defaults.defaultPriority;
  return {
    id: uid(),
    title: (email.subject || '(no subject)').slice(0, 200),
    notes: `From: ${from.name || from.email}\nReceived: ${email.date || ''}\n\n${email.snippet || ''}`,
    priority,
    due: '',
    tags: defaults.autoTag ? [defaults.autoTag] : [],
    project: defaults.defaultProject || 'Inbox',
    done: false,
    created: Date.now(),
    source: { type:'gmail', id: email.id, threadId: email.threadId, from: from.email },
  };
}

// OAuth via Google Identity Services token flow (client-side, no backend).
// options.silent=true uses prompt:'none' for background refresh — fails if user
// signed out of Google or hasn't granted consent before. options.hint pre-selects
// the Google account to refresh.
function requestGmailToken(clientId, options = {}){
  return new Promise((resolve, reject)=>{
    const gs = window.google?.accounts?.oauth2;
    if(!gs) return reject(new Error('Google Identity Services not loaded yet. Wait a moment and try again.'));
    const client = gs.initTokenClient({
      client_id: clientId,
      scope: GMAIL_SCOPE,
      hint: options.hint || undefined,
      callback: (resp) => {
        if(resp.error) reject(new Error(resp.error_description || resp.error));
        else resolve(resp);   // { access_token, expires_in, scope, ... }
      },
      error_callback: (err) => reject(new Error(err?.message || 'OAuth failed')),
    });
    client.requestAccessToken({ prompt: options.silent ? 'none' : '' });
  });
}

function revokeGmailToken(token){
  if(!token) return;
  try { window.google?.accounts?.oauth2?.revoke(token, ()=>{}); } catch(e){}
}

async function fetchGmailProfile(token){
  const r = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/profile',
    { headers: { Authorization: `Bearer ${token}` } });
  if(!r.ok) throw new Error(`Profile fetch failed (${r.status})`);
  return r.json();   // { emailAddress, messagesTotal, ... }
}

async function fetchGmailMessages(token, query, max=25){
  const listUrl = `https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=${max}&q=${encodeURIComponent(query)}`;
  const lr = await fetch(listUrl, { headers: { Authorization: `Bearer ${token}` } });
  if(!lr.ok) throw new Error(`List failed (${lr.status})`);
  const list = await lr.json();
  const ids = (list.messages || []).map(m => m.id);
  if(ids.length===0) return [];

  const details = await Promise.all(ids.map(async id => {
    const url = `https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}`
              + `?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`;
    const r = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if(!r.ok) return null;
    const m = await r.json();
    const headers = Object.fromEntries((m.payload?.headers || [])
      .map(h => [h.name.toLowerCase(), h.value]));
    return {
      id: m.id, threadId: m.threadId,
      snippet: m.snippet,
      from: headers.from || '',
      subject: headers.subject || '(no subject)',
      date: headers.date || '',
      labelIds: m.labelIds || [],
      internalDate: Number(m.internalDate) || 0,
    };
  }));
  return details.filter(Boolean).sort((a,b)=> b.internalDate - a.internalDate);
}

/* ------------------------------ Sound engine ------------------------------ */
function useSound(enabled){
  const ctxRef = useRef(null);
  const getCtx = () => {
    if(!ctxRef.current){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(AC) ctxRef.current = new AC();
    }
    return ctxRef.current;
  };
  const tone = useCallback((freq, dur=0.14, type='sine', gain=0.08, when=0)=>{
    if(!enabled) return;
    const ctx = getCtx(); if(!ctx) return;
    const t = ctx.currentTime + when;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g).connect(ctx.destination);
    o.start(t); o.stop(t+dur+0.02);
  },[enabled]);
  const play = useCallback((name)=>{
    if(!enabled) return;
    const ctx = getCtx(); if(!ctx) return;
    if(ctx.state === 'suspended') ctx.resume();
    switch(name){
      case 'complete':
        tone(880,0.10,'sine',0.10,0);
        tone(1175,0.14,'sine',0.09,0.06);
        tone(1568,0.18,'triangle',0.07,0.14);
        break;
      case 'add':
        tone(660,0.08,'triangle',0.06,0);
        tone(880,0.08,'triangle',0.05,0.05);
        break;
      case 'delete':
        tone(320,0.10,'sawtooth',0.05,0);
        tone(220,0.14,'sawtooth',0.05,0.08);
        break;
      case 'levelup':
        tone(523,0.12,'triangle',0.09,0);
        tone(659,0.12,'triangle',0.09,0.10);
        tone(784,0.14,'triangle',0.09,0.22);
        tone(1046,0.22,'triangle',0.10,0.36);
        break;
      case 'achievement':
        tone(700,0.10,'sine',0.08,0);
        tone(900,0.10,'sine',0.08,0.08);
        tone(1200,0.16,'sine',0.09,0.18);
        break;
      case 'click':
        tone(500,0.04,'square',0.03,0);
        break;
      case 'pencil': {
        // Realistic pencil-on-paper: grain-based friction + wood resonance + filter sweep.
        // Each "grain" simulates graphite catching on a paper fiber — short bursts
        // with random amplitude + a sine-shaped envelope to avoid clicks.
        const bufferDur = 0.62;
        const sr  = ctx.sampleRate;
        const len = Math.floor(sr * bufferDur);
        const buf = ctx.createBuffer(1, len, sr);
        const d   = buf.getChannelData(0);

        let grainPos = 0, grainLen = 0, grainAmp = 0;
        for(let i=0;i<len;i++){
          if(grainPos >= grainLen){ // new micro-scratch
            grainPos = 0;
            grainLen = 3 + Math.floor(Math.random() * 28);  // 0.06-0.65 ms at 48k
            grainAmp = 0.25 + Math.random()*0.75;
          }
          const grainEnv = Math.sin(Math.PI * grainPos / grainLen); // smooth attack/decay
          grainPos++;

          const t = i/len; // 0..1 across the buffer
          const attack  = Math.min(1, t * 20);       // ~30ms attack
          const release = Math.min(1, (1-t) * 12);   // ~50ms release
          const env     = Math.min(attack, release);

          // Slow pressure undulation so it sounds like a hand drawing, not static hiss.
          const press = 0.55 + 0.45 * Math.sin(t*Math.PI*5.3 + Math.sin(t*Math.PI*11.7));

          const white = Math.random()*2 - 1;
          d[i] = white * grainAmp * grainEnv * env * press * 0.55;
        }

        const src = ctx.createBufferSource(); src.buffer = buf;

        // Friction peak — lead scraping paper fibers. Slight sweep = "pencil in motion".
        const bpFric = ctx.createBiquadFilter();
        bpFric.type = 'bandpass'; bpFric.Q.value = 1.3;

        // Woody body resonance of the pencil barrel.
        const bpWood = ctx.createBiquadFilter();
        bpWood.type = 'bandpass'; bpWood.Q.value = 3.2; bpWood.frequency.value = 1100;

        // Gentle high-shelf roll-off so it's not harsh.
        const hs = ctx.createBiquadFilter();
        hs.type = 'highshelf'; hs.frequency.value = 6500; hs.gain.value = -6;

        const gFric = ctx.createGain(); gFric.gain.value = 0.85;
        const gWood = ctx.createGain(); gWood.gain.value = 0.22;
        const master = ctx.createGain();

        const tS = ctx.currentTime;
        bpFric.frequency.setValueAtTime(2600, tS);
        bpFric.frequency.linearRampToValueAtTime(4100, tS+0.28);
        bpFric.frequency.linearRampToValueAtTime(3000, tS+bufferDur);

        master.gain.setValueAtTime(0.0001, tS);
        master.gain.exponentialRampToValueAtTime(0.13, tS+0.04);
        master.gain.setValueAtTime(0.13, tS+bufferDur-0.10);
        master.gain.exponentialRampToValueAtTime(0.0001, tS+bufferDur);

        src.connect(bpFric).connect(gFric).connect(hs).connect(master);
        src.connect(bpWood).connect(gWood).connect(master);
        master.connect(ctx.destination);
        src.start(tS);
        break;
      }
    }
  },[enabled,tone]);
  return play;
}

/* -------------------------------- Confetti -------------------------------- */
function Confetti({ burstKey }){
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  useEffect(()=>{
    if(!burstKey) return;
    const canvas = canvasRef.current; if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const resize = ()=>{ canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize(); window.addEventListener('resize',resize);
    const colors = ['#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#f472b6'];
    const parts = Array.from({length:90}, ()=>({
      x: window.innerWidth/2 + (Math.random()-0.5)*80,
      y: window.innerHeight/2 - 50 + (Math.random()-0.5)*40,
      vx: (Math.random()-0.5)*9,
      vy: Math.random()*-8 - 4,
      g: 0.22 + Math.random()*0.1,
      size: 4 + Math.random()*6,
      rot: Math.random()*Math.PI,
      vr: (Math.random()-0.5)*0.4,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 1,
    }));
    let start = performance.now();
    const loop = (now)=>{
      const t = (now-start)/1000;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      parts.forEach(p=>{
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        p.life = Math.max(0, 1 - t/2.2);
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.5);
        ctx.restore();
      });
      if(t<2.4) rafRef.current = requestAnimationFrame(loop);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    };
    rafRef.current = requestAnimationFrame(loop);
    return ()=>{ cancelAnimationFrame(rafRef.current); window.removeEventListener('resize',resize); };
  },[burstKey]);
  return <canvas ref={canvasRef} className="pointer-events-none fixed inset-0 z-50" />;
}

/* ------------------------------- Root App --------------------------------- */
function App(){
  const [state, setState] = useState(()=>{
    try{
      const raw = localStorage.getItem('questlist.v1');
      if(raw){
        const parsed = JSON.parse(raw);
        return {...DEFAULT_STATE, ...parsed, gmail: migrateGmailState(parsed.gmail)};
      }
    }catch(e){}
    return DEFAULT_STATE;
  });
  useEffect(()=>{ try{ localStorage.setItem('questlist.v1', JSON.stringify(state)); }catch(e){} },[state]);

  const playSound = useSound(state.settings.soundOn);

  const [filter, setFilter] = useState({ status:'active', project:'All', tag:'', q:'', sort:'smart' });
  const [confettiKey, setConfettiKey] = useState(0);
  const [xpFloaters, setXpFloaters] = useState([]);
  const [toast, setToast] = useState(null); // {title, body, type}
  const [showLevelUp, setShowLevelUp] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [editing, setEditing] = useState(null); // task
  const [strikingIds, setStrikingIds] = useState(()=> new Set());
  const STRIKE_MS = 650;

  // Gmail runtime sessions (not persisted — tokens expire). Keyed by accountId.
  const [gmailSessions, setGmailSessions] = useState({}); // { [accountId]: {token,expiresAt,profile} }
  const [gmailOpen, setGmailOpen] = useState(false);
  const [profileOpen, setProfileOpen] = useState(false);
  const [gmailEmailsByAccount, setGmailEmailsByAccount] = useState({}); // { [accountId]: emails[] }
  const [gmailLoadingByAccount, setGmailLoadingByAccount] = useState({}); // { [accountId]: bool }
  const [gmailDemoMode, setGmailDemoMode] = useState(false);
  const [activeAccountId, setActiveAccountId] = useState(null);

  // Auto-select first account when accounts change and none is selected
  useEffect(()=>{
    if(!activeAccountId && state.gmail.accounts?.[0]){
      setActiveAccountId(state.gmail.accounts[0].id);
    }
  },[state.gmail.accounts, activeAccountId]);

  const stats = useMemo(()=>{
    const completedTotal = state.tasks.filter(t=>t.done).length;
    const activeTotal = state.tasks.filter(t=>!t.done).length;
    const highDone = state.tasks.filter(t=>t.done && t.priority==='high').length;
    const todayDone = state.tasks.filter(t=>t.done && t.completedOn===isoToday).length;
    return { completedTotal, activeTotal, highDone, todayDone };
  },[state.tasks]);

  const levelInfo = useMemo(()=> levelForXP(state.player.xp), [state.player.xp]);

  // Detect level-up via effect so it fires reliably regardless of stale closures
  const prevLevelRef = useRef(null);
  useEffect(()=>{
    if(prevLevelRef.current !== null && levelInfo.level > prevLevelRef.current){
      setTimeout(()=>{
        playSound('levelup');
        setShowLevelUp(levelInfo.level);
        setTimeout(()=> setShowLevelUp(null), 1600);
      }, 250);
    }
    prevLevelRef.current = levelInfo.level;
  }, [levelInfo.level]);

  const showToast = (t)=>{ setToast(t); setTimeout(()=>setToast(null), 2400); };

  /* ----------------------------- Task actions ---------------------------- */
  const addTask = (data) => {
    const t = { id:uid(), title:data.title.trim(), notes:data.notes||'', priority:data.priority||'medium',
                due:data.due||'', tags:data.tags||[], project:data.project||'Inbox',
                done:false, created: Date.now() };
    setState(s=>({ ...s, tasks:[t, ...s.tasks] }));
    playSound('add');
  };

  const updateTask = (id, patch) => {
    setState(s=>({ ...s, tasks: s.tasks.map(t=> t.id===id ? {...t, ...patch} : t) }));
  };

  const deleteTask = (id) => {
    setState(s=>({ ...s, tasks: s.tasks.filter(t=>t.id!==id) }));
    playSound('delete');
  };

  const completeTask = (task, rowEl) => {
    if(task.done) { // uncomplete: revert XP
      const refund = PRIORITIES[task.priority].xp;
      setState(s=>({ ...s,
        tasks: s.tasks.map(t=> t.id===task.id ? {...t, done:false, completedOn:null} : t),
        player:{ ...s.player, xp: Math.max(0, s.player.xp - refund) }
      }));
      return;
    }
    if(strikingIds.has(task.id)) return;
    // Kick off pencil scribble + scratch sound, then fire real completion.
    setStrikingIds(s => { const n = new Set(s); n.add(task.id); return n; });
    playSound('pencil');
    setTimeout(() => {
      setStrikingIds(s => { const n = new Set(s); n.delete(task.id); return n; });
      finalizeCompletion(task, rowEl);
    }, STRIKE_MS);
  };

  const finalizeCompletion = (task, rowEl) => {
    const gained = PRIORITIES[task.priority].xp;
    const coinsEarned = Math.max(1, Math.round(gained/5));

    // XP floater position
    const rect = rowEl?.getBoundingClientRect?.();
    const floaterId = uid();
    if(rect){
      setXpFloaters(f=>[...f, { id: floaterId, x: rect.left+28, y: rect.top+10, amount: gained }]);
      setTimeout(()=> setXpFloaters(f=>f.filter(x=>x.id!==floaterId)), 900);
    }

    setState(s=>{
      const { lastCompleteDay, streak, bestStreak, xp } = s.player;
      let newStreak = 1;
      if(lastCompleteDay){
        const d = daysBetween(isoToday, lastCompleteDay);
        if(d===0) newStreak = streak;
        else if(d===1) newStreak = streak + 1;
        else newStreak = 1;
      }
      const newXP = xp + gained;
      const next = { ...s,
        tasks: s.tasks.map(t=> t.id===task.id ? {...t, done:true, completedOn: isoToday} : t),
        player: { ...s.player,
          xp: newXP,
          coins: s.player.coins + coinsEarned,
          streak: newStreak,
          bestStreak: Math.max(bestStreak, newStreak),
          lastCompleteDay: isoToday,
          achievements: { ...s.player.achievements },
        }
      };
      const computedStats = {
        completedTotal: next.tasks.filter(t=>t.done).length,
        highDone: next.tasks.filter(t=>t.done && t.priority==='high').length,
      };
      ACHIEVEMENTS.forEach(a=>{
        if(!next.player.achievements[a.id] && a.check(next.player, computedStats)){
          next.player.achievements[a.id] = Date.now();
          setTimeout(()=>{ playSound('achievement'); showToast({ type:'achievement', title:'Achievement unlocked', body:a.label });}, 200);
        }
      });
      return next;
    });

    playSound('complete');
    if(state.settings.confettiOn) setConfettiKey(k=>k+1);
    // level-up is detected by the prevLevelRef useEffect above
  };

  /* ----------------------------- Projects -------------------------------- */
  const addProject = (name) => {
    const n = name.trim(); if(!n) return;
    if(state.projects.includes(n)) return;
    setState(s=>({...s, projects:[...s.projects, n]}));
  };
  const deleteProject = (name) => {
    if(name==='Inbox') return;
    setState(s=>({
      ...s,
      projects: s.projects.filter(p=>p!==name),
      tasks: s.tasks.map(t=> t.project===name ? {...t, project:'Inbox'} : t),
    }));
  };

  /* ----------------------------- Import/Export --------------------------- */
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `questlist-${isoToday}.json`; a.click();
    URL.revokeObjectURL(url);
  };
  const importJSON = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        if(!parsed.tasks) throw new Error('Invalid file');
        // Merge mode: partial files (no player/settings) are appended to existing
        // state — your XP, streak, projects, and existing tasks are preserved.
        const isMergeMode = !parsed.player && !parsed.settings;
        if(isMergeMode){
          setState(s => {
            const existing = new Set(s.projects);
            const newProjects = (parsed.projects || []).filter(p => !existing.has(p));
            return {
              ...s,
              tasks: [...parsed.tasks, ...s.tasks],
              projects: [...s.projects, ...newProjects],
              gmail: {
                ...s.gmail,
                importedIds: { ...s.gmail.importedIds, ...(parsed.gmail?.importedIds || {}) },
              },
            };
          });
          showToast({type:'info', title:'Synced', body:`Added ${parsed.tasks.length} task${parsed.tasks.length===1?'':'s'}`});
        } else {
          setState({ ...DEFAULT_STATE, ...parsed });
          showToast({type:'info', title:'Import complete', body:`Loaded ${parsed.tasks.length} tasks`});
        }
      }catch(e){ showToast({type:'error', title:'Import failed', body:String(e.message||e)}); }
    };
    reader.readAsText(file);
  };
  const resetAll = () => {
    if(confirm('Reset all data? This cannot be undone.')) setState(DEFAULT_STATE);
  };

  /* ----------------------------- Gmail actions (multi-account) --------- */
  const gmailGetAccount = (accountId) => state.gmail.accounts.find(a => a.id === accountId);

  const gmailAddAccount = (partial) => {
    const d = state.gmail.defaults;
    const acc = {
      id: 'acc-' + uid(),
      label: partial.label || 'New Inbox',
      email: partial.email || '',
      gmailUserIndex: partial.gmailUserIndex ?? 0,
      sourceMode: partial.sourceMode || d.sourceMode,
      defaultProject: partial.defaultProject || d.defaultProject,
      defaultPriority: partial.defaultPriority || d.defaultPriority,
      autoTag: partial.autoTag ?? d.autoTag,
      query: partial.query || d.query,
      enabled: partial.enabled !== false,
      lastSync: null,
    };
    setState(s => ({ ...s, gmail: { ...s.gmail, accounts: [...s.gmail.accounts, acc] } }));
    setActiveAccountId(acc.id);
    showToast({ type:'info', title:'Account added', body: acc.label });
    return acc;
  };

  const gmailUpdateAccount = (accountId, patch) => {
    setState(s => ({ ...s, gmail: { ...s.gmail,
      accounts: s.gmail.accounts.map(a => a.id===accountId ? {...a, ...patch} : a) } }));
  };

  const gmailRemoveAccount = (accountId) => {
    if(!confirm('Remove this inbox? Tasks already created stay; just stops future syncs.')) return;
    if(gmailSessions[accountId]?.token) revokeGmailToken(gmailSessions[accountId].token);
    setGmailSessions(s => { const n={...s}; delete n[accountId]; return n; });
    setGmailEmailsByAccount(s => { const n={...s}; delete n[accountId]; return n; });
    setState(s => {
      const importedIds = { ...s.gmail.importedIds }; delete importedIds[accountId];
      return { ...s, gmail: { ...s.gmail,
        accounts: s.gmail.accounts.filter(a => a.id !== accountId),
        importedIds } };
    });
    if(activeAccountId === accountId) setActiveAccountId(null);
  };

  const gmailConnect = async (accountId) => {
    const clientId = (state.gmail.clientId || '').trim();
    if(!clientId){ showToast({ type:'error', title:'Client ID required', body:'Add an OAuth Client ID in Defaults.'}); return; }
    try{
      const resp = await requestGmailToken(clientId);
      const expiresAt = Date.now() + (resp.expires_in || 3600) * 1000;
      const profile = await fetchGmailProfile(resp.access_token);
      setGmailSessions(s => ({ ...s, [accountId]: { token: resp.access_token, expiresAt, profile } }));
      setGmailDemoMode(false);
      // Auto-fill email on the account if empty
      const acc = gmailGetAccount(accountId);
      if(acc && !acc.email && profile.emailAddress){
        gmailUpdateAccount(accountId, { email: profile.emailAddress });
      }
      showToast({ type:'info', title:'Connected', body: profile.emailAddress });
      gmailRefresh(accountId, resp.access_token);
    }catch(e){
      showToast({ type:'error', title:'Connect failed', body: String(e.message||e) });
    }
  };

  const gmailDisconnect = (accountId) => {
    const sess = gmailSessions[accountId];
    if(sess?.token) revokeGmailToken(sess.token);
    setGmailSessions(s => { const n={...s}; delete n[accountId]; return n; });
    setGmailEmailsByAccount(s => { const n={...s}; delete n[accountId]; return n; });
    showToast({ type:'info', title:'Disconnected' });
  };

  const setLoading = (accountId, val) =>
    setGmailLoadingByAccount(s => ({ ...s, [accountId]: val }));

  const gmailRefresh = async (accountId, tokenOverride) => {
    if(gmailDemoMode){
      setLoading(accountId, true);
      setTimeout(()=>{
        setGmailEmailsByAccount(s => ({ ...s, [accountId]: DEMO_EMAILS() }));
        setLoading(accountId, false);
      }, 400);
      return;
    }
    const acc = gmailGetAccount(accountId);
    if(!acc) return;
    if(acc.sourceMode === 'browser'){
      // Browser mode: actual sync happens via Claude in Chrome (external).
      // Here we just indicate "ready"; tasks are pushed via JSON merge import.
      showToast({ type:'info', title:'Browser-mode sync',
        body:'Ask Claude to sync this inbox in chat.' });
      return;
    }
    const token = tokenOverride || gmailSessions[accountId]?.token;
    if(!token){ showToast({ type:'error', title:'Not connected', body:'Connect this account first.' }); return; }
    setLoading(accountId, true);
    try{
      const msgs = await fetchGmailMessages(token, acc.query, 25);
      setGmailEmailsByAccount(s => ({ ...s, [accountId]: msgs }));
      gmailUpdateAccount(accountId, { lastSync: Date.now() });
    }catch(e){
      showToast({ type:'error', title:'Fetch failed', body:String(e.message||e) });
    }finally{
      setLoading(accountId, false);
    }
  };

  const gmailRefreshAll = async () => {
    const enabled = state.gmail.accounts.filter(a => a.enabled);
    if(enabled.length === 0){ showToast({ type:'error', title:'No accounts', body:'Add an inbox first.' }); return; }
    if(gmailDemoMode){
      enabled.forEach(a => gmailRefresh(a.id));
      return;
    }
    let oauthCount = 0, browserCount = 0;
    for(const a of enabled){
      if(a.sourceMode === 'oauth' && gmailSessions[a.id]?.token){
        await gmailRefresh(a.id);
        oauthCount++;
      } else if(a.sourceMode === 'browser'){
        browserCount++;
      }
    }
    if(browserCount > 0){
      showToast({ type:'info', title:'Sync All',
        body:`${oauthCount} via OAuth, ${browserCount} await Claude.` });
    }
  };

  // Silent OAuth token refresh: re-up access tokens ~5 min before expiry so the
  // user doesn't have to keep clicking Connect. Falls back silently if the user
  // signed out of Google — they'll just have to reconnect manually next time.
  const silentRefreshDataRef = useRef({ accounts: [], sessions: {}, clientId: '' });
  useEffect(()=>{
    silentRefreshDataRef.current = {
      accounts: state.gmail.accounts || [],
      sessions: gmailSessions,
      clientId: state.gmail.clientId || '',
    };
  }, [state.gmail.accounts, gmailSessions, state.gmail.clientId]);

  useEffect(()=>{
    const REFRESH_WINDOW_MS = 5 * 60 * 1000; // refresh if within 5 min of expiry
    const tick = async () => {
      const { accounts, sessions, clientId } = silentRefreshDataRef.current;
      const cid = clientId.trim();
      if(!cid) return;
      const now = Date.now();
      for(const acc of accounts){
        if(acc.sourceMode !== 'oauth' || !acc.enabled) continue;
        const sess = sessions[acc.id];
        if(!sess?.token || !sess.expiresAt) continue;
        if(sess.expiresAt - now > REFRESH_WINDOW_MS) continue;
        try{
          const resp = await requestGmailToken(cid, { silent: true, hint: acc.email });
          const expiresAt = Date.now() + (resp.expires_in || 3600) * 1000;
          setGmailSessions(s => s[acc.id]
            ? { ...s, [acc.id]: { ...s[acc.id], token: resp.access_token, expiresAt } }
            : s);
        }catch(e){
          // Silent — don't toast. If the user signed out of Google we let the
          // token lapse and surface "Connect" UI on the next manual interaction.
        }
      }
    };
    const id = setInterval(tick, 60 * 1000);
    tick(); // run once on mount in case a stored token is already near expiry
    return ()=> clearInterval(id);
  }, []);

  // Built-in auto-sync: refresh OAuth accounts on a rolling interval without Cowork
  const autoSyncDataRef = useRef({ accounts: [], sessions: {} });
  useEffect(()=>{
    autoSyncDataRef.current = { accounts: state.gmail.accounts, sessions: gmailSessions };
  }, [state.gmail.accounts, gmailSessions]);
  const gmailRefreshRef = useRef(null);
  useEffect(()=>{ gmailRefreshRef.current = gmailRefresh; });
  useEffect(()=>{
    const ms = Math.max(5, state.gmail.schedule?.intervalMinutes || 15) * 60 * 1000;
    const id = setInterval(()=>{
      const { accounts, sessions } = autoSyncDataRef.current;
      accounts
        .filter(a => a.enabled && a.sourceMode === 'oauth')
        .forEach(a => {
          const sess = sessions[a.id];
          if(sess?.token && (!sess.expiresAt || sess.expiresAt > Date.now() + 60_000)){
            gmailRefreshRef.current?.(a.id);
          }
        });
    }, ms);
    return ()=> clearInterval(id);
  }, [state.gmail.schedule?.intervalMinutes]);

  const gmailEnterDemo = () => {
    setGmailDemoMode(true);
    if(state.gmail.accounts.length === 0){
      // Auto-create two demo accounts
      gmailAddAccount({ label:'Work (demo)', email:'mike@work.demo', gmailUserIndex:0,
        defaultProject:'BlueConic', autoTag:'email-bc' });
      gmailAddAccount({ label:'Personal (demo)', email:'mike@personal.demo', gmailUserIndex:1,
        defaultProject:'Personal', autoTag:'email-personal' });
    }
    state.gmail.accounts.forEach(a => {
      setLoading(a.id, true);
      setTimeout(()=>{
        setGmailEmailsByAccount(s => ({ ...s, [a.id]: DEMO_EMAILS() }));
        setLoading(a.id, false);
      }, 350);
    });
  };

  const gmailImportSelected = (accountId, selectedIds) => {
    if(!selectedIds.length){ showToast({ type:'error', title:'Nothing selected', body:'Pick at least one email.' }); return; }
    const acc = gmailGetAccount(accountId); if(!acc) return;
    const accImported = state.gmail.importedIds[accountId] || {};
    const emails = gmailEmailsByAccount[accountId] || [];
    const picked = emails.filter(e => selectedIds.includes(e.id));
    const newTasks = picked
      .filter(e => !accImported[e.id])
      .map(e => emailToTaskPatch(e, acc));
    if(newTasks.length === 0){
      showToast({ type:'info', title:'Already imported', body:'These emails are already tasks.' });
      return;
    }
    setState(s => {
      const accIds = { ...(s.gmail.importedIds[accountId] || {}) };
      newTasks.forEach(t => { accIds[t.source.id] = t.id; });
      return {
        ...s,
        tasks:[...newTasks, ...s.tasks],
        gmail:{ ...s.gmail, importedIds: { ...s.gmail.importedIds, [accountId]: accIds } },
      };
    });
    playSound('add');
    showToast({ type:'info', title:'Imported', body:`${newTasks.length} task${newTasks.length===1?'':'s'} from ${acc.label}` });
  };

  const gmailUpdateDefaults = (patch) =>
    setState(s => ({ ...s, gmail: { ...s.gmail, defaults: { ...s.gmail.defaults, ...patch } } }));

  const gmailUpdateClientId = (clientId) => {
    // Sanitize: strip whitespace, accidental http(s):// prefix, trailing slashes,
    // and anything after the .apps.googleusercontent.com suffix.
    let cleaned = (clientId || '').trim().replace(/^https?:\/\//i, '').replace(/\/+$/,'');
    const m = cleaned.match(/^([0-9A-Za-z._-]+\.apps\.googleusercontent\.com)/);
    if(m) cleaned = m[1];
    setState(s => ({ ...s, gmail: { ...s.gmail, clientId: cleaned } }));
  };

  /* ----------------------------- Derived list ---------------------------- */
  const allTags = useMemo(()=> {
    const s = new Set();
    state.tasks.forEach(t=> (t.tags||[]).forEach(x=>s.add(x)));
    return [...s].sort();
  },[state.tasks]);

  const visibleTasks = useMemo(()=>{
    let list = [...state.tasks];
    if(filter.status==='active') list = list.filter(t=>!t.done);
    else if(filter.status==='done') list = list.filter(t=>t.done);
    else if(filter.status==='today') list = list.filter(t=>!t.done && t.due===isoToday);
    else if(filter.status==='overdue') list = list.filter(t=>!t.done && t.due && t.due<isoToday);
    if(filter.project!=='All') list = list.filter(t=> (t.project||'Inbox')===filter.project);
    if(filter.tag) list = list.filter(t=> (t.tags||[]).includes(filter.tag));
    if(filter.q){
      const q = filter.q.toLowerCase();
      list = list.filter(t=> t.title.toLowerCase().includes(q) || (t.notes||'').toLowerCase().includes(q));
    }
    const prioVal = {high:3, medium:2, low:1};
    const sortFns = {
      smart: (a,b)=>{
        if(a.done!==b.done) return a.done?1:-1;
        const ao = a.due && a.due<isoToday && !a.done ? 1 : 0;
        const bo = b.due && b.due<isoToday && !b.done ? 1 : 0;
        if(ao!==bo) return bo-ao;
        if(prioVal[b.priority]!==prioVal[a.priority]) return prioVal[b.priority]-prioVal[a.priority];
        if(a.due && b.due) return a.due.localeCompare(b.due);
        if(a.due) return -1; if(b.due) return 1;
        return b.created-a.created;
      },
      dueAsc:   (a,b)=> (a.due||'9999').localeCompare(b.due||'9999'),
      prio:     (a,b)=> prioVal[b.priority]-prioVal[a.priority],
      newest:   (a,b)=> b.created - a.created,
      oldest:   (a,b)=> a.created - b.created,
    };
    list.sort(sortFns[filter.sort] || sortFns.smart);
    return list;
  },[state.tasks, filter]);

/* ----------------------------- Voice → Task parser ----------------------- */
// Parses natural-language voice transcripts into task fields.
// Examples:
//   "In BlueConic folder, add a task for creating a listener"
//     → { title: "Creating a listener", project: "BlueConic" }
//   "Remind me to call Sarah tomorrow, high priority"
//     → { title: "Call Sarah", due: <tomorrow's ISO>, priority: "high" }
//   "Add a task to follow up with Ryan in BlueConic, due Friday #email"
//     → { title: "Follow up with Ryan", project: "BlueConic", due: <Friday>, tags: ["email"] }
function parseVoiceCommand(transcript, projects){
  let text = transcript.trim();
  let project = null, priority = null, due = '', tags = [];

  // Project: "in/to/under [name] folder|project|category|list"
  const projMatch = text.match(/\b(?:in|to|under)\s+(?:the\s+)?([\w\s'-]+?)\s+(?:folder|project|category|list)\b/i);
  if(projMatch){
    const candidate = projMatch[1].trim();
    const matched = projects.find(p => p.toLowerCase() === candidate.toLowerCase());
    if(matched){
      project = matched;
      text = (text.slice(0, projMatch.index) + text.slice(projMatch.index + projMatch[0].length)).trim();
    }
  }
  if(!project){
    // Bare project name: "in BlueConic", "to Personal"
    for(const p of projects){
      const re = new RegExp(`\\b(?:in|to)\\s+${p.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\b`, 'i');
      const m = text.match(re);
      if(m){ project = p; text = (text.slice(0,m.index) + text.slice(m.index+m[0].length)).trim(); break; }
    }
  }

  // Priority
  for(const [re, p] of [
    [/\b(?:urgent|asap|critical|high\s+priority|important)\b/i, 'high'],
    [/\b(?:low\s+priority|whenever|sometime|when\s+i\s+have\s+time)\b/i, 'low'],
    [/\b(?:medium\s+priority|normal\s+priority)\b/i, 'medium'],
  ]){
    if(re.test(text)){ priority = p; text = text.replace(re, '').trim(); break; }
  }

  // Due date
  const today = new Date(); today.setHours(0,0,0,0);
  const dayMatch = text.match(/\b(?:due|by|on)\s+(today|tomorrow|monday|tuesday|wednesday|thursday|friday|saturday|sunday|next\s+week|end\s+of\s+(?:day|week|month))\b/i);
  if(dayMatch){
    const word = dayMatch[1].toLowerCase().replace(/\s+/g,' ');
    let target = null;
    if(word === 'today' || word === 'end of day') target = today;
    else if(word === 'tomorrow') target = new Date(today.getTime() + 86400000);
    else if(word === 'next week' || word === 'end of week'){ target = new Date(today.getTime() + 7*86400000); }
    else if(word === 'end of month'){ target = new Date(today.getFullYear(), today.getMonth()+1, 0); }
    else {
      const dayMap = {sunday:0, monday:1, tuesday:2, wednesday:3, thursday:4, friday:5, saturday:6};
      const idx = dayMap[word];
      if(idx !== undefined){
        const cur = today.getDay();
        let diff = (idx - cur + 7) % 7;
        if(diff === 0) diff = 7;
        target = new Date(today.getTime() + diff*86400000);
      }
    }
    if(target){ due = target.toISOString().slice(0,10); text = text.replace(dayMatch[0],'').trim(); }
  }

  // Hashtags → tags
  const found = [...text.matchAll(/#(\w+)/g)].map(m => m[1]);
  if(found.length){ tags = found; text = text.replace(/#\w+/g,'').trim(); }

  // Strip leading command boilerplate
  text = text.replace(/^(?:please\s+)?(?:add|create|make|new|set\s+up|set)\s+(?:a\s+|an\s+)?task\s+(?:for|to|about|saying|that\s+says|titled|called)?\s*/i,'').trim();
  text = text.replace(/^(?:remind\s+me\s+to|i\s+need\s+to|todo|task|note)\s*/i,'').trim();
  text = text.replace(/^(?:and\s+|then\s+|also\s+)/i,'').trim();

  // Cleanup punctuation, trailing commas, capitalize
  text = text.replace(/\s*,\s*/g,' ').replace(/\s+/g,' ').replace(/[.,;:!?]+$/,'').trim();
  if(text.length > 0) text = text[0].toUpperCase() + text.slice(1);

  return { title: text, project, priority, due, tags };
}

/* -------------------------------- QuickAdd -------------------------------- */
function QuickAdd({ projects, allTags, onAdd, playSound }){
  const [title, setTitle] = useState('');
  const [priority, setPriority] = useState('medium');
  const [due, setDue] = useState('');
  const [project, setProject] = useState(projects[0]||'Inbox');
  const [tagInput, setTagInput] = useState('');
  const inputRef = useRef(null);

  // Voice state
  const [listening, setListening] = useState(false);
  const [voiceText, setVoiceText] = useState('');
  const [voicePreview, setVoicePreview] = useState(null);
  const recRef = useRef(null);
  const finalRef = useRef('');
  const SR = (typeof window !== 'undefined') && (window.SpeechRecognition || window.webkitSpeechRecognition);

  useEffect(()=>{
    const onKey = (e)=>{
      if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); inputRef.current?.focus(); }
    };
    window.addEventListener('keydown', onKey);
    return ()=> window.removeEventListener('keydown', onKey);
  },[]);

  const submit = (e) => {
    e.preventDefault();
    if(!title.trim()) return;
    const tags = tagInput.split(',').map(t=>t.trim().replace(/^#/,'')).filter(Boolean);
    onAdd({ title, priority, due, tags, project });
    setTitle(''); setTagInput(''); setDue('');
  };

  const startVoice = () => {
    if(!SR){
      alert('Voice input requires Chrome or Edge. Other browsers don\'t support the Web Speech API.');
      return;
    }
    if(listening){ recRef.current?.stop(); return; }

    const rec = new SR();
    rec.continuous = false;
    rec.interimResults = true;
    rec.lang = 'en-US';
    finalRef.current = '';
    setVoiceText('');
    setVoicePreview(null);

    rec.onresult = (e) => {
      let interim = '';
      for(let i = e.resultIndex; i < e.results.length; i++){
        const r = e.results[i];
        if(r.isFinal) finalRef.current += r[0].transcript + ' ';
        else interim += r[0].transcript;
      }
      const live = (finalRef.current + interim).trim();
      setVoiceText(live);
      // Live preview
      if(live){
        try { setVoicePreview(parseVoiceCommand(live, projects)); } catch(e){}
      }
    };
    rec.onerror = (e) => {
      console.warn('Speech error:', e.error);
      setListening(false);
    };
    rec.onend = () => {
      setListening(false);
      const transcript = (finalRef.current || voiceText).trim();
      if(transcript){
        const parsed = parseVoiceCommand(transcript, projects);
        if(parsed.title){
          onAdd({
            title: parsed.title,
            priority: parsed.priority || priority,
            due: parsed.due || due,
            tags: parsed.tags.length ? parsed.tags : tagInput.split(',').map(t=>t.trim().replace(/^#/,'')).filter(Boolean),
            project: parsed.project || project,
          });
          if(playSound) playSound('add');
        }
      }
      setVoiceText('');
      setVoicePreview(null);
    };
    recRef.current = rec;
    rec.start();
    setListening(true);
  };

  const showLive = listening && voiceText;

  return (
    <form onSubmit={submit} className="glass rounded-2xl p-3 md:p-4 flex flex-wrap items-center gap-2 shadow-xl shadow-black/20 relative">
      <div className="flex-1 min-w-[220px] flex items-center gap-2">
        <div className="w-8 h-8 rounded-lg bg-amber-400/15 border border-amber-300/25 grid place-items-center text-amber-300 shrink-0">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/>
          </svg>
        </div>
        <input
          ref={inputRef}
          value={showLive ? voiceText : title}
          onChange={e=>setTitle(e.target.value)}
          disabled={listening}
          placeholder={listening ? 'Listening… speak now' : 'Write a new quest…   (⌘/Ctrl+K)   or click 🎤'}
          className={`flex-1 bg-transparent outline-none placeholder:text-white/40 py-2 text-[15px] ${listening?'text-rose-200':''}`}
        />
        <button
          type="button"
          onClick={startVoice}
          aria-label={listening ? 'Stop listening' : 'Add task by voice'}
          title={SR ? (listening ? 'Listening… click to stop' : 'Add task by voice') : 'Voice not supported (use Chrome/Edge)'}
          className={`w-9 h-9 rounded-lg grid place-items-center transition shrink-0 relative
            ${!SR ? 'bg-white/5 text-white/30 cursor-not-allowed'
              : listening ? 'bg-rose-500 text-white shadow-lg shadow-rose-500/40'
              : 'bg-white/5 text-white/65 hover:text-white hover:bg-white/10'}`}>
          {listening && <span className="absolute inset-0 rounded-lg ring-2 ring-rose-400/60 animate-pulseRing"/>}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>
      <select value={priority} onChange={e=>setPriority(e.target.value)} className="px-2 py-1.5 rounded-lg glass-lite text-sm ring-focus" disabled={listening}>
        {Object.entries(PRIORITIES).map(([k,v])=>(
          <option key={k} value={k}>{v.label} · +{v.xp} XP</option>
        ))}
      </select>
      <input type="date" value={due} onChange={e=>setDue(e.target.value)}
        disabled={listening}
        className="px-2 py-1.5 rounded-lg glass-lite text-sm ring-focus"/>
      <select value={project} onChange={e=>setProject(e.target.value)} disabled={listening} className="px-2 py-1.5 rounded-lg glass-lite text-sm ring-focus">
        {projects.map(p=> <option key={p} value={p}>{p}</option>)}
      </select>
      <input value={tagInput} onChange={e=>setTagInput(e.target.value)} disabled={listening} placeholder="tags, comma, separated"
        className="px-2 py-1.5 rounded-lg glass-lite text-sm ring-focus w-44"/>
      <button className="px-4 py-2 rounded-lg font-semibold text-sm bg-gradient-to-r from-violet-500 to-fuchsia-500 hover:brightness-110 shadow-lg shadow-fuchsia-500/20" disabled={listening}>
        Add
      </button>

      {/* Live voice preview popover */}
      {listening && voicePreview && voicePreview.title && (
        <div className="absolute left-3 right-3 -bottom-[72px] modal-pane rounded-xl px-4 py-2.5 text-sm flex items-center gap-3 z-20 animate-floatUp">
          <span className="text-rose-300 animate-pulse">●</span>
          <div className="flex-1 min-w-0">
            <div className="text-xs text-white/55">Will create:</div>
            <div className="truncate"><b>{voicePreview.title}</b>
              {voicePreview.project && <span className="text-violet-300"> → {voicePreview.project}</span>}
              {voicePreview.priority && <span className={`ml-2 ${PRIORITIES[voicePreview.priority]?.color || ''}`}>· {voicePreview.priority}</span>}
              {voicePreview.due && <span className="ml-2 text-amber-300">· due {voicePreview.due}</span>}
              {voicePreview.tags?.length > 0 && <span className="ml-2 text-white/55">· {voicePreview.tags.map(t=>'#'+t).join(' ')}</span>}
            </div>
          </div>
        </div>
      )}
    </form>
  );
}

/* ------------------------------ StatusTabs -------------------------------- */
function StatusTabs({ filter, setFilter, tasks }){
  const tabs = [
    { k:'all',     label:'All',     count: tasks.length },
    { k:'active',  label:'Active',  count: tasks.filter(t=>!t.done).length },
    { k:'today',   label:'Today',   count: tasks.filter(t=>!t.done && t.due===isoToday).length },
    { k:'overdue', label:'Overdue', count: tasks.filter(t=>!t.done && t.due && t.due<isoToday).length },
    { k:'done',    label:'Done',    count: tasks.filter(t=>t.done).length },
  ];
  return (
    <div className="flex flex-wrap gap-1 glass-lite rounded-xl p-1">
      {tabs.map(t=>(
        <button key={t.k}
          onClick={()=>setFilter(f=>({...f, status:t.k}))}
          className={`px-3 py-1.5 rounded-lg text-sm transition flex items-center gap-2
            ${filter.status===t.k? 'bg-white/10 text-white':'text-white/60 hover:text-white'}`}>
          <span>{t.label}</span>
          <span className="text-[11px] text-white/50">{t.count}</span>
        </button>
      ))}
    </div>
  );
}

/* -------------------------------- TaskList -------------------------------- */
function TaskList({ tasks, strikingIds, onComplete, onEdit, onDelete }){
  if(tasks.length===0){
    return (
      <div className="mt-10 text-center text-white/50 animate-floatUp">
        <div className="text-5xl mb-3">✨</div>
        <div>Nothing here. Add a quest to earn XP.</div>
      </div>
    );
  }
  return (
    <ul className="mt-4 space-y-2">
      {tasks.map(t => <TaskRow key={t.id} task={t} striking={strikingIds?.has(t.id)} onComplete={onComplete} onEdit={onEdit} onDelete={onDelete}/>)}
    </ul>
  );
}

/* ------------------------ Pencil strike primitives ------------------------ */
function StrikeLine({ animate }){
  return (
    <span
      aria-hidden="true"
      className={`strike-bar ${animate ? 'strike-bar-animate' : 'strike-bar-static'}`}
    />
  );
}
function PencilTip(){
  return (
    <span className="pencil-tip-move" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" className="block">
        {/* wooden barrel */}
        <rect x="8"  y="3"  width="8" height="12" fill="#f6c246" stroke="#8a6a1a" strokeWidth="0.4"/>
        <rect x="8"  y="3"  width="8" height="2"  fill="#d89a22"/>
        {/* ferrule */}
        <rect x="8"  y="15" width="8" height="1.4" fill="#c9c9cf"/>
        {/* eraser */}
        <rect x="8"  y="16" width="8" height="2"  fill="#d9493a"/>
        {/* wood tip */}
        <polygon points="8,3 12,-1 16,3" fill="#f2dcaf" stroke="#8a6a1a" strokeWidth="0.4"/>
        {/* graphite point */}
        <polygon points="10.8,0.4 12,-1 13.2,0.4" fill="#2b2b2b"/>
        {/* highlight */}
        <rect x="9.2" y="5" width="1.2" height="10" fill="#fff" opacity="0.35"/>
      </svg>
    </span>
  );
}

function TaskRow({ task, striking, onComplete, onEdit, onDelete }){
  const p = PRIORITIES[task.priority] || PRIORITIES.medium;
  const overdue = !task.done && task.due && task.due < isoToday;
  const dueToday = !task.done && task.due === isoToday;
  const ref = useRef(null);
  return (
    <li ref={ref}
      className={`glass rounded-xl p-3 flex items-start gap-3 animate-slideIn
        ${task.done ? 'opacity-60':''}`}>
      <button
        onClick={()=>onComplete(task, ref.current)}
        className={`relative shrink-0 w-7 h-7 rounded-full border-2 grid place-items-center transition
          ${task.done ? 'bg-gradient-to-br from-emerald-400 to-teal-500 border-emerald-300 animate-pop' : `border-white/25 hover:border-white/60 ${p.ring}`}`}
        aria-label={task.done?'Mark as not done':'Complete task'}>
        {task.done && (
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13l4 4L19 7"/></svg>
        )}
        {striking && !task.done && (
          <span className="absolute inset-[-2px] rounded-full ring-2 ring-amber-300/60 animate-pulseRing pointer-events-none"/>
        )}
      </button>

      <div className="flex-1 min-w-0">
        <div className="flex items-start gap-2">
          <div className={`flex-1 text-[15px] ${task.done ? 'text-white/60' : ''}`}>
            <span className="relative inline-block max-w-full align-baseline">
              <span>{task.title}</span>
              {(striking || task.done) && <StrikeLine animate={striking}/>}
              {striking && <PencilTip/>}
            </span>
          </div>
          <span className={`chip ${p.bg} ${p.color}`}>
            <span className={`w-1.5 h-1.5 rounded-full ${p.dot}`}/>
            {p.label} · +{p.xp}
          </span>
        </div>
        {task.notes && <div className="text-sm text-white/60 mt-1 whitespace-pre-wrap">{task.notes}</div>}
        <div className="flex flex-wrap items-center gap-1.5 mt-2">
          {task.project && task.project!=='Inbox' && <span className="chip bg-white/5 text-white/70">📂 {task.project}</span>}
          {task.due && (
            <span className={`chip ${overdue?'bg-rose-500/15 text-rose-300': dueToday?'bg-amber-500/15 text-amber-300':'bg-white/5 text-white/60'}`}>
              📅 {task.due}{overdue && ' · overdue'}{dueToday && ' · today'}
            </span>
          )}
          {(task.tags||[]).map(t=> <span key={t} className="chip bg-white/5 text-white/60">#{t}</span>)}
        </div>
      </div>

      <div className="flex items-center gap-1 shrink-0">
        <IconBtn title="Edit" onClick={()=>onEdit(task)}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>
        </IconBtn>
        <IconBtn title="Delete" onClick={()=>{ if(confirm('Delete this task?')) onDelete(task.id); }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </IconBtn>
      </div>
    </li>
  );
}
const IconBtn = ({children, title, onClick}) => (
  <button title={title} onClick={onClick} className="w-8 h-8 rounded-lg text-white/60 hover:text-white hover:bg-white/10 grid place-items-center transition">{children}</button>
);

/* -------------------------------- ProfileModal ----------------------------- */
function ProfileModal({ profile, player, levelInfo, onClose, onSave }){
  const [name, setName] = useState(profile.name || '');
  const [avatarDataUrl, setAvatarDataUrl] = useState(profile.avatarDataUrl || '');
  const [friends, setFriends] = useState(profile.friends || []);
  const [friendInput, setFriendInput] = useState('');
  const [saved, setSaved] = useState(false);
  const avatarRef = useRef(null);

  const handleAvatar = (e) => {
    const file = e.target.files?.[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setAvatarDataUrl(ev.target.result);
    reader.readAsDataURL(file);
  };

  const addFriend = () => {
    const email = friendInput.trim().toLowerCase();
    if(!email || friends.includes(email)) return;
    setFriends(f => [...f, email]);
    setFriendInput('');
  };

  const save = () => {
    onSave({ name: name.trim(), avatarDataUrl, friends });
    setSaved(true);
    setTimeout(() => { setSaved(false); onClose(); }, 800);
  };

  return (
    <div className="fixed inset-0 z-50 grid place-items-center p-4 bg-black/55 backdrop-blur-sm animate-floatUp">
      <div className="modal-pane rounded-2xl w-full max-w-md flex flex-col overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 p-4 border-b border-white/5">
          <div className="font-semibold flex-1">Your Profile</div>
          <button onClick={onClose} className="text-white/60 hover:text-white px-2">✕</button>
        </div>

        <div className="p-5 space-y-5 overflow-auto">
          {/* Avatar */}
          <div className="flex items-center gap-4">
            <button onClick={()=>avatarRef.current?.click()}
              className="w-20 h-20 rounded-full overflow-hidden bg-gradient-to-br from-violet-500 to-fuchsia-500 grid place-items-center shadow-lg hover:brightness-110 transition shrink-0 relative group">
              {avatarDataUrl
                ? <img src={avatarDataUrl} alt="avatar" className="w-full h-full object-cover"/>
                : <span className="text-3xl">{name ? name[0].toUpperCase() : '👤'}</span>}
              <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition grid place-items-center text-xs font-semibold">Upload</div>
            </button>
            <input ref={avatarRef} type="file" accept="image/*" className="hidden" onChange={handleAvatar}/>
            <div className="flex-1 space-y-2">
              <Field label="Display name">
                <input value={name} onChange={e=>setName(e.target.value)}
                  placeholder="Your name"
                  className="w-full px-3 py-2 rounded-lg glass-lite ring-focus"/>
              </Field>
              <div className="text-xs text-white/40">Level {levelInfo.level} · {player.xp} XP · {player.coins} coins · {player.streak}-day streak</div>
            </div>
          </div>

          {/* Friends */}
          <div>
            <div className="text-[11px] uppercase tracking-[0.2em] text-white/40 font-semibold mb-2">Friends</div>
            <div className="flex gap-2 mb-2">
              <input value={friendInput} onChange={e=>setFriendInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter' && addFriend()}
                placeholder="friend@email.com"
                className="flex-1 px-3 py-2 rounded-lg glass-lite ring-focus text-sm"/>
              <button onClick={addFriend}
                className="px-3 py-2 rounded-lg bg-violet-500/80 hover:bg-violet-500 text-sm font-semibold">Add</button>
            </div>
            {friends.length === 0
              ? <div className="text-xs text-white/35 italic">No friends added yet. Add their emails to compare progress.</div>
              : <div className="space-y-1">
                  {friends.map(f=>(
                    <div key={f} className="flex items-center gap-2 text-sm glass-lite rounded-lg px-3 py-1.5">
                      <span className="flex-1 text-white/70 truncate">{f}</span>
                      <span className="text-[10px] text-white/30 italic">Local only — sharing coming soon</span>
                      <button onClick={()=>setFriends(fs=>fs.filter(x=>x!==f))} className="text-white/30 hover:text-rose-400 text-xs ml-1">✕</button>
                    </div>
                  ))}
                </div>}
          </div>
        </div>

        <div className="p-4 border-t border-white/5 flex justify-end gap-2">
          <button onClick={onClose} className="px-3 py-2 rounded-lg glass-lite hover:bg-white/10 text-sm">Cancel</button>
          <button onClick={save}
            className={`px-5 py-2 rounded-lg font-semibold text-sm transition ${saved ? 'bg-emerald-500/30 text-emerald-200' : 'bg-gradient-to-r from-violet-500 to-fuchsia-500 hover:brightness-110'}`}>
            {saved ? '✓ Saved!' : 'Save profile'}
          </button>
        </div>
      </div>
    </div>
  );
}
