              onAdd={onAddAccount} onUpdate={onUpdateAccount} onRemove={onRemoveAccount}
              onConnect={onConnect} onDisconnect={onDisconnect}
              onRefresh={onRefresh} onDemo={onDemo}
              onSelectActive={(id)=>{ setActiveAccountId(id); setTab('inbox'); }}
            />
          )}
          {tab==='auto' && (
            <AutomationPanel state={state} setState={setState}/>
          )}
          {tab==='defaults' && (
            <DefaultsPanel state={state}
              onUpdateDefaults={onUpdateDefaults}
              onUpdateClientId={onUpdateClientId}/>
          )}
          {tab==='inbox' && (
            <div>
              {!hasAccounts && (
                <div className="text-center py-12">
                  <div className="text-5xl mb-3">📬</div>
                  <div className="text-white/70">No inboxes yet — add one or try demo mode.</div>
                  <div className="mt-4 flex justify-center gap-2">
                    <button onClick={()=>setTab('accounts')}
                      className="px-4 py-2 rounded-lg bg-gradient-to-r from-violet-500 to-fuchsia-500 text-sm font-semibold">Add an inbox</button>
                    <button onClick={onDemo}
                      className="px-4 py-2 rounded-lg glass-lite hover:bg-white/10 text-sm">Try demo mode</button>
                  </div>
                </div>
              )}
              {hasAccounts && (
                <>
                  {/* Account picker chips */}
                  <div className="flex gap-1.5 overflow-x-auto pb-2 -mx-1 px-1 scroll-thin">
                    {accounts.map(a => {
                      const sess = sessions[a.id];
                      const isActive = a.id === activeAccountId;
                      const isReady = a.sourceMode === 'browser' || demoMode || !!sess?.token;
                      const count = (emailsByAccount[a.id] || []).length;
                      return (
                        <button key={a.id}
                          onClick={()=>setActiveAccountId(a.id)}
                          className={`shrink-0 px-3 py-1.5 rounded-lg border text-sm whitespace-nowrap transition flex items-center gap-2
                            ${isActive ? 'bg-white/10 border-white/20 text-white' : 'glass-lite border-white/5 text-white/65 hover:text-white'}`}>
                          <span className={`w-1.5 h-1.5 rounded-full ${isReady ? 'bg-emerald-400' : 'bg-white/30'}`}/>
                          <span className="font-medium">{a.label}</span>
                          {count > 0 && <span className="text-[11px] text-white/50">{count}</span>}
                          <span className="text-[10px] uppercase tracking-wider text-white/40">{a.sourceMode}</span>
                        </button>
                      );
                    })}
                  </div>

                  {activeAccount && (
                    <div className="mt-3">
                      {/* Active account toolbar */}
                      <div className="flex items-center justify-between mb-2 text-xs">
                        <div className="text-white/55">
                          {activeAccount.email || activeAccount.label}
                          {activeAccount.lastSync && <span> · last sync {new Date(activeAccount.lastSync).toLocaleString()}</span>}
                        </div>
                        <div className="flex items-center gap-2">
                          <button onClick={()=>onRefresh(activeAccount.id)}
                            disabled={activeLoading}
                            className="text-violet-300 hover:text-violet-200 disabled:opacity-50">
                            {activeLoading ? 'Syncing…' : 'Sync this'}
                          </button>
                          {activeAccount.sourceMode === 'oauth' && !sessions[activeAccount.id]?.token && !demoMode && (
                            <button onClick={()=>onConnect(activeAccount.id)}
                              className="text-emerald-300 hover:text-emerald-200">Connect</button>
                          )}
                          {activeAccount.sourceMode === 'oauth' && sessions[activeAccount.id]?.token && (
                            <button onClick={()=>onDisconnect(activeAccount.id)}
                              className="text-rose-300 hover:text-rose-200">Disconnect</button>
                          )}
                        </div>
                      </div>

                      {activeAccount.sourceMode === 'browser' && activeEmails.length === 0 && !activeLoading && (
                        <div className="text-center py-10 text-white/55 text-sm">
                          <div className="text-3xl mb-2">🤖</div>
                          <div>This is a browser-mode inbox.</div>
                          <div className="text-xs mt-1">In chat, ask Claude to "sync {activeAccount.label}" — Claude will read your inbox via Chrome and push tasks here.</div>
                        </div>
                      )}

                      {activeLoading && activeEmails.length === 0 && (
                        <div className="text-center py-10 text-white/50">Loading emails…</div>
                      )}

                      {activeEmails.length > 0 && (
                        <>
                          <div className="flex items-center justify-between mb-2 text-xs">
                            <div className="text-white/50">
                              {activeEmails.length} email{activeEmails.length===1?'':'s'} · {activeSelected.size} selected
                            </div>
                            <div className="flex gap-3">
                              <button
                                onClick={()=>{
                                  const ids = activeEmails.filter(e => !activeImported[e.id]).map(e => e.id);
                                  setSelected(activeAccount.id, ()=> new Set(ids));
                                }}
                                className="text-violet-300 hover:text-violet-200">Select all new</button>
                              <button
                                onClick={()=> setSelected(activeAccount.id, ()=> new Set())}
                                className="text-white/50 hover:text-white">Clear</button>
                            </div>
                          </div>
                          <ul className="space-y-2">
                            {activeEmails.map(e => {
                              const already = !!activeImported[e.id];
                              const isSel = activeSelected.has(e.id);
                              const from = parseGmailFrom(e.from);
                              const prio = activeAccount.defaultPriority === 'auto'
                                ? inferPriorityFromEmail(e) : activeAccount.defaultPriority;
                              const p = PRIORITIES[prio];
                              return (
                                <li key={e.id}
                                  className={`rounded-xl p-3 border transition cursor-pointer
                                    ${already ? 'bg-white/[0.02] border-white/5 opacity-60'
                                      : isSel ? 'bg-violet-500/15 border-violet-400/40'
                                      : 'glass-lite hover:bg-white/[0.07] border-white/5'}`}
                                  onClick={()=> !already && toggleSel(activeAccount.id, e.id)}>
                                  <div className="flex items-start gap-3">
                                    <input type="checkbox" disabled={already} checked={isSel} readOnly
                                      className="mt-1 w-4 h-4 accent-violet-500"/>
                                    <div className="flex-1 min-w-0">
                                      <div className="flex items-center gap-2">
                                        <div className="font-medium text-[14px] truncate flex-1">{e.subject}</div>
                                        <span className={`chip ${p.bg} ${p.color}`}>
                                          <span className={`w-1.5 h-1.5 rounded-full ${p.dot}`}/>
                                          {p.label}
                                        </span>
                                      </div>
                                      <div className="text-xs text-white/60 truncate mt-0.5">{from.name || from.email}</div>
                                      <div className="text-xs text-white/50 line-clamp-2 mt-1">{e.snippet}</div>
                                      <div className="flex flex-wrap gap-1 mt-2">
                                        {e.labelIds?.includes('IMPORTANT') && <span className="chip bg-rose-500/15 text-rose-300">Important</span>}
                                        {e.labelIds?.includes('STARRED')   && <span className="chip bg-amber-500/15 text-amber-300">Starred</span>}
                                        {e.labelIds?.includes('UNREAD')    && <span className="chip bg-sky-500/15 text-sky-300">Unread</span>}
                                        {already && <span className="chip bg-emerald-500/15 text-emerald-300">Imported</span>}
                                      </div>
                                    </div>
                                  </div>
                                </li>
                              );
                            })}
                          </ul>
                        </>
                      )}
                    </div>
                  )}
                </>
              )}
            </div>
          )}
        </div>

        {/* Footer */}
        {tab==='inbox' && hasAccounts && activeAccount && (
          <div className="p-3 border-t border-white/5 flex items-center justify-between gap-3">
            <div className="text-xs text-white/50">{activeAccount.label}</div>
            <div className="flex gap-2">
              <button onClick={onClose}
                className="px-3 py-2 rounded-lg glass-lite hover:bg-white/10 text-sm">Close</button>
              <button
                disabled={activeSelected.size===0}
                onClick={()=>onImport(activeAccount.id, [...activeSelected])}
                className="px-4 py-2 rounded-lg text-sm font-semibold bg-gradient-to-r from-violet-500 to-fuchsia-500 hover:brightness-110 disabled:opacity-40 disabled:cursor-not-allowed">
                Import {activeSelected.size > 0 ? `${activeSelected.size} → ` : ''}Task{activeSelected.size===1?'':'s'}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
const TabBtn = ({active, onClick, children}) => (
  <button onClick={onClick}
    className={`px-3 py-2 text-sm rounded-t-lg transition
      ${active ? 'bg-white/10 text-white border-b-2 border-violet-400 -mb-px' : 'text-white/55 hover:text-white'}`}>
    {children}
  </button>
);

/* --------- Accounts panel: add/edit/remove inboxes --------- */
function AccountsPanel({ state, sessions, demoMode, loadingByAccount,
                         onAdd, onUpdate, onRemove, onConnect, onDisconnect,
                         onRefresh, onDemo, onSelectActive }){
  const [adding, setAdding] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const accounts = state.gmail.accounts || [];

  return (
    <div className="space-y-4">
      {accounts.length === 0 && (
        <div className="text-center py-6 rounded-xl border border-white/5 bg-white/[0.02]">
          <div className="text-3xl mb-2">📭</div>
          <div className="text-white/70 text-sm">No inboxes yet.</div>
          <div className="mt-3 flex justify-center gap-2">
            <button onClick={()=>setAdding(true)}
              className="px-4 py-2 rounded-lg bg-gradient-to-r from-violet-500 to-fuchsia-500 text-sm font-semibold">
              + Add inbox
            </button>
            <button onClick={onDemo}
              className="px-4 py-2 rounded-lg glass-lite hover:bg-white/10 text-sm">Demo mode</button>
          </div>
        </div>
      )}

      {accounts.map(a => {
        const sess = sessions[a.id];
        const ready = a.sourceMode === 'browser' || demoMode || !!sess?.token;
        const isEditing = editingId === a.id;
        return (
          <div key={a.id} className="rounded-xl border border-white/5 bg-white/[0.02]">
            <div className="p-3 flex items-center gap-3">
              <span className={`w-2 h-2 rounded-full shrink-0 ${ready ? 'bg-emerald-400' : 'bg-white/25'}`}/>
              <div className="min-w-0 flex-1">
                <div className="flex items-center gap-2 flex-wrap">
                  <div className="font-semibold text-sm">{a.label}</div>
                  <span className={`chip ${(a.provider||'gmail')==='outlook' ? 'bg-sky-500/15 text-sky-300' : 'bg-rose-500/15 text-rose-300'}`}>
                    {(a.provider||'gmail')==='outlook' ? 'Outlook' : 'Gmail'}
                  </span>
                  <span className="chip bg-white/5 text-white/60">{a.sourceMode}</span>
                  <span className="chip bg-white/5 text-white/60">→ {a.defaultProject}</span>
                  {a.autoTag && <span className="chip bg-white/5 text-white/60">#{a.autoTag}</span>}
                  {!a.enabled && <span className="chip bg-rose-500/15 text-rose-300">Disabled</span>}
                </div>
                <div className="text-xs text-white/50 truncate">
                  {a.email || '(no email yet)'}
                  {(a.provider||'gmail')==='gmail' ? ` · u/${a.gmailUserIndex ?? 0}` : ` · ${a.outlookHost || 'office'}`}
                  {a.lastSync && <span> · synced {new Date(a.lastSync).toLocaleString()}</span>}
                </div>
              </div>
              <div className="flex items-center gap-1 text-xs">
                <button onClick={()=>onSelectActive(a.id)}
                  className="px-2 py-1 rounded text-violet-300 hover:bg-violet-500/10">Open</button>
                <button onClick={()=>setEditingId(isEditing ? null : a.id)}
                  className="px-2 py-1 rounded text-white/65 hover:bg-white/10">{isEditing?'Done':'Edit'}</button>
                <button onClick={()=>onRemove(a.id)}
                  className="px-2 py-1 rounded text-rose-300 hover:bg-rose-500/10">Remove</button>
              </div>
            </div>

            {isEditing && (
              <AccountEditor account={a} projects={state.projects}
                onUpdate={(p)=>onUpdate(a.id, p)}
                onConnect={a.sourceMode==='oauth' && !sess?.token ? ()=>onConnect(a.id) : null}
                onDisconnect={a.sourceMode==='oauth' && sess?.token ? ()=>onDisconnect(a.id) : null}
              />
            )}
          </div>
        );
      })}

      {adding ? (
        <NewAccountForm
          defaults={state.gmail.defaults}
          existingIndices={accounts.map(a=>a.gmailUserIndex)}
          projects={state.projects}
          onCancel={()=>setAdding(false)}
          onCreate={(data)=>{ onAdd(data); setAdding(false); }}
        />
      ) : (
        accounts.length > 0 && (
          <button onClick={()=>setAdding(true)}
            className="w-full px-3 py-3 rounded-xl border border-dashed border-white/15 text-white/60 hover:bg-white/5 text-sm">
            + Add another inbox
          </button>
        )
      )}
    </div>
  );
}

function NewAccountForm({ defaults, existingIndices, projects, onCancel, onCreate }){
  const nextU = (() => { for(let i=0;i<10;i++) if(!existingIndices.includes(i)) return i; return 0; })();
  const [form, setForm] = useState({
    label: '',
    email: '',
    provider: 'gmail',                  // 'gmail' | 'outlook'
    gmailUserIndex: nextU,              // /mail/u/N for Gmail
    outlookHost: 'office',              // 'office' (work) | 'live' (personal)
    sourceMode: defaults.sourceMode,
    defaultProject: defaults.defaultProject,
    defaultPriority: defaults.defaultPriority,
    autoTag: defaults.autoTag,
    query: defaults.query,
  });
  const valid = form.label.trim().length > 0;
  const isGmail = form.provider === 'gmail';
  return (
    <div className="rounded-xl border border-violet-400/30 bg-violet-500/5 p-4">
      <div className="font-semibold mb-3">Add inbox</div>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Label">
          <input value={form.label} onChange={e=>setForm({...form, label:e.target.value})}
            placeholder="e.g. Personal, Side project, Client X"
            className="w-full px-3 py-2 rounded-lg glass-lite ring-focus"/>
        </Field>
        <Field label="Provider">
          <select value={form.provider} onChange={e=>setForm({...form, provider: e.target.value, autoTag: e.target.value==='outlook' && form.autoTag==='email' ? 'email-outlook' : form.autoTag })}
            className="w-full px-2 py-2 rounded-lg glass-lite ring-focus">
            <option value="gmail">Gmail / Google Workspace</option>
            <option value="outlook">Outlook / Microsoft 365</option>
          </select>
        </Field>
        {isGmail ? (
          <Field label="Gmail account index (u/N)">
            <input type="number" min="0" max="9" value={form.gmailUserIndex}
              onChange={e=>setForm({...form, gmailUserIndex: Math.max(0, Number(e.target.value)||0)})}
              className="w-full px-3 py-2 rounded-lg glass-lite ring-focus"/>
          </Field>
        ) : (
          <Field label="Outlook host">
            <select value={form.outlookHost} onChange={e=>setForm({...form, outlookHost: e.target.value})}
              className="w-full px-2 py-2 rounded-lg glass-lite ring-focus">
              <option value="office">outlook.office.com (Microsoft 365 / work)</option>
              <option value="live">outlook.live.com (personal Hotmail/Outlook.com)</option>
            </select>
          </Field>
        )}
        <Field label="Source mode">
          <select value={form.sourceMode} onChange={e=>setForm({...form, sourceMode:e.target.value})}
            className="w-full px-2 py-2 rounded-lg glass-lite ring-focus">
            <option value="browser">Browser (Claude in Chrome)</option>
            <option value="oauth">OAuth ({isGmail ? 'Gmail API' : 'Microsoft Graph'})</option>
          </select>
        </Field>
        <Field label="Default project">
          <select value={form.defaultProject} onChange={e=>setForm({...form, defaultProject:e.target.value})}
            className="w-full px-2 py-2 rounded-lg glass-lite ring-focus">
            {projects.map(p=> <option key={p} value={p}>{p}</option>)}
          </select>
        </Field>
        <Field label="Default priority">
          <select value={form.defaultPriority} onChange={e=>setForm({...form, defaultPriority:e.target.value})}
            className="w-full px-2 py-2 rounded-lg glass-lite ring-focus">
            <option value="auto">Auto (infer)</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </Field>
        <Field label="Auto tag">
          <input value={form.autoTag} onChange={e=>setForm({...form, autoTag:e.target.value.replace(/^#/,'')})}
            className="w-full px-3 py-2 rounded-lg glass-lite ring-focus"/>
        </Field>
        <div className="col-span-2">
          <Field label="Search query (Gmail syntax)">
            <input value={form.query} onChange={e=>setForm({...form, query:e.target.value})}
              className="w-full px-3 py-2 rounded-lg glass-lite ring-focus font-mono text-xs"/>
          </Field>
        </div>
      </div>
      <div className="mt-3 flex justify-end gap-2">
        <button onClick={onCancel} className="px-3 py-2 rounded-lg glass-lite hover:bg-white/10 text-sm">Cancel</button>
        <button onClick={()=>onCreate(form)} disabled={!valid}
          className="px-4 py-2 rounded-lg bg-gradient-to-r from-violet-500 to-fuchsia-500 text-sm font-semibold disabled:opacity-40">
          Create
        </button>
      </div>
    </div>
  );
}

        <Field label="Default priority">
          <select value={account.defaultPriority} onChange={e=>onUpdate({defaultPriority:e.target.value})}
            className="w-full px-2 py-2 rounded-lg glass-lite ring-focus">
            <option value="auto">Auto</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </Field>
        <Field label="Auto tag">
          <input value={account.autoTag} onChange={e=>onUpdate({autoTag:e.target.value.replace(/^#/,'')})}
            className="w-full px-3 py-2 rounded-lg glass-lite ring-focus"/>

        <Field label="Enabled">
          <label className="flex items-center gap-2 px-3 py-2 rounded-lg glass-lite text-sm">
            <input type="checkbox" checked={account.enabled} onChange={e=>onUpdate({enabled: e.target.checked})}
              className="w-4 h-4 accent-violet-500"/>

        </Field>
        <div className="col-span-2">
          <Field label="Search query">
            <input value={account.query} onChange={e=>onUpdate({query:e.target.value})}
              className="w-full px-3 py-2 rounded-lg glass-lite ring-focus font-mono text-xs"/>
          </Field>
        </div>
      </div>
      {(onConnect || onDisconnect) && (
        <div className="mt-3 flex gap-2">
          {onConnect && (
            <button onClick={onConnect} className="px-3 py-2 rounded-lg bg-emerald-500/20 text-emerald-200 border border-emerald-400/30 text-sm">
              Connect via OAuth
            </button>
          )}
          {onDisconnect && (
            <button onClick={onDisconnect} className="px-3 py-2 rounded-lg bg-rose-500/20 text-rose-200 border border-rose-400/30 text-sm">
              Disconnect
            </button>
          )}
        </div>
      )}
    </div>
  );
}

/* --------- Defaults panel: global defaults + OAuth client id --------- */
function DefaultsPanel({ state, onUpdateDefaults, onUpdateClientId }){
  const d = state.gmail.defaults;
  const [clientId, setClientId] = useState(state.gmail.clientId || '');
  const [draft, setDraft] = useState({ ...d });
  const [saved, setSaved] = useState(false);
  const dirty = clientId !== (state.gmail.clientId || '') ||
    JSON.stringify(draft) !== JSON.stringify(d);

  const save = () => {
    onUpdateClientId(clientId);
    onUpdateDefaults(draft);
    setSaved(true);
    setTimeout(() => setSaved(false), 1800);
  };

  return (
    <div className="space-y-5">
      <div>
        <Field label="Google OAuth Client ID (shared across all OAuth-mode inboxes)">
          <input value={clientId} onChange={e=>setClientId(e.target.value)}

            className="w-full px-3 py-2 rounded-lg glass-lite ring-focus font-mono text-xs"/>

        <div className="text-[11px] text-white/50 mt-1">Skip this if all your inboxes use Browser (Claude in Chrome) mode.</div>
      </div>

      <div>
        <SectionTitle>Defaults for new inboxes</SectionTitle>
        <div className="grid grid-cols-2 gap-3 mt-2">
          <Field label="Source mode">
            <select value={draft.sourceMode} onChange={e=>setDraft(d=>({...d, sourceMode:e.target.value}))}
              className="w-full px-2 py-2 rounded-lg glass-lite ring-focus">
              <option value="browser">Browser (Claude in Chrome)</option>
              <option value="oauth">OAuth (Gmail API)</option>
            </select>
          </Field>
          <Field label="Default project">
            <select value={draft.defaultProject} onChange={e=>setDraft(d=>({...d, defaultProject:e.target.value}))}
              className="w-full px-2 py-2 rounded-lg glass-lite ring-focus">
              {state.projects.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
          </Field>
          <Field label="Default priority">
            <select value={draft.defaultPriority} onChange={e=>setDraft(d=>({...d, defaultPriority:e.target.value}))}
              className="w-full px-2 py-2 rounded-lg glass-lite ring-focus">
              <option value="auto">Auto (infer)</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </Field>
          <Field label="Auto tag">
            <input value={draft.autoTag} onChange={e=>setDraft(d=>({...d, autoTag: e.target.value.replace(/^#/,'')}))}
              className="w-full px-3 py-2 rounded-lg glass-lite ring-focus"/>
          </Field>
          <div className="col-span-2">
            <Field label="Search query">
              <input value={draft.query} onChange={e=>setDraft(d=>({...d, query: e.target.value}))}
                className="w-full px-3 py-2 rounded-lg glass-lite ring-focus font-mono text-xs"/>
            </Field>
          </div>
        </div>
      </div>

      <div className="flex justify-end">
        <button onClick={save}
          className={`px-5 py-2 rounded-lg font-semibold text-sm transition
            ${saved ? 'bg-emerald-500/30 text-emerald-200' : dirty ? 'bg-gradient-to-r from-violet-500 to-fuchsia-500 hover:brightness-110' : 'glass-lite text-white/40 cursor-not-allowed'}`}
          disabled={!dirty && !saved}>
          {saved ? '✓ Saved' : 'Save changes'}
        </button>
      </div>

      <div className="rounded-xl bg-white/[0.03] border border-white/5 p-3 text-xs text-white/60">
        <b className="text-white/80">Auto priority:</b> Important/Starred or words like
        <i> urgent, asap, deadline, action required</i> → <span className="text-rose-300">High</span>.
        Words like <i>review, please, approve, follow up</i> → <span className="text-violet-300">Medium</span>.
        Else → <span className="text-sky-300">Low</span>.
      </div>
    </div>
  );
}

/* --------- Automation panel: scheduled recurring sync --------- */
function AutomationPanel({ state, setState }){
  const sch = state.gmail.schedule || {};
  const [draft, setDraft] = useState({ enabled: !!sch.enabled, intervalMinutes: sch.intervalMinutes || 15 });
  const [saved, setSaved] = useState(false);
  const dirty = draft.enabled !== !!sch.enabled || draft.intervalMinutes !== (sch.intervalMinutes || 15);

  const save = () => {
    setState(s => ({ ...s, gmail: { ...s.gmail, schedule: { ...s.gmail.schedule, ...draft } } }));
    setSaved(true);
    setTimeout(() => setSaved(false), 1800);
  };

  const oauthAccounts = (state.gmail.accounts || []).filter(a => a.sourceMode === 'oauth' && a.enabled);
  const browserAccounts = (state.gmail.accounts || []).filter(a => a.sourceMode === 'browser' && a.enabled);

  return (
    <div className="space-y-5">
      <div className="rounded-xl bg-white/[0.03] border border-white/5 p-4">
        <div className="flex items-center justify-between gap-3">
          <div>
            <div className="font-semibold">Built-in auto-sync</div>
            <div className="text-xs text-white/55 mt-1">
              Automatically re-fetches your <b className="text-white/80">OAuth-mode</b> inboxes in the background while this tab is open.
              No external tools needed — runs directly in the browser on the interval below.
            </div>
          </div>
          <label className="flex items-center gap-2 cursor-pointer shrink-0">
            <input type="checkbox" checked={draft.enabled}
              onChange={e=>setDraft(d=>({...d, enabled:e.target.checked}))}
              className="w-5 h-5 accent-violet-500"/>
            <span className="text-sm">{draft.enabled ? 'On' : 'Off'}</span>
          </label>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <Field label="Sync interval (minutes)">
          <input type="number" min="5" step="5" value={draft.intervalMinutes}
            onChange={e=>setDraft(d=>({...d, intervalMinutes: Math.max(5, Number(e.target.value)||15)}))}
            className="w-full px-3 py-2 rounded-lg glass-lite ring-focus"/>
        </Field>
        <div className="flex items-end">
          <button onClick={save}
            className={`w-full px-4 py-2 rounded-lg font-semibold text-sm transition
              ${saved ? 'bg-emerald-500/30 text-emerald-200' : dirty ? 'bg-gradient-to-r from-violet-500 to-fuchsia-500 hover:brightness-110' : 'glass-lite text-white/40 cursor-not-allowed'}`}
            disabled={!dirty && !saved}>
            {saved ? '✓ Saved' : 'Save'}
          </button>
        </div>
      </div>

      <div className="rounded-xl bg-white/[0.02] border border-white/5 p-4 text-sm space-y-2">
        <div className="font-semibold text-white/80">Account status</div>
        {oauthAccounts.length === 0 && browserAccounts.length === 0 && (
          <div className="text-white/50">No enabled inboxes yet.</div>
        )}
        {oauthAccounts.map(a => (
          <div key={a.id} className="flex items-center gap-2 text-xs">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-400"/>
            <span className="text-white/80">{a.label}</span>
            <span className="text-white/40">· OAuth · auto-syncs every {draft.intervalMinutes}m</span>
            {a.lastSync && <span className="text-white/35">· last {new Date(a.lastSync).toLocaleTimeString()}</span>}
          </div>
        ))}
        {browserAccounts.map(a => (
          <div key={a.id} className="flex items-center gap-2 text-xs">
            <span className="w-1.5 h-1.5 rounded-full bg-amber-400"/>
            <span className="text-white/80">{a.label}</span>
            <span className="text-amber-300/70">· Browser mode · manual sync only (switch to OAuth for auto-sync)</span>
          </div>
        ))}
      </div>

      <div className="text-xs text-white/45">
        Auto-sync only runs while this tab is open and requires an active OAuth connection. Tokens expire after ~1 hour — reconnect in Accounts if sync stops.
      </div>
    </div>
  );
}

/* ------------------------------ Achievements ------------------------------ */
function Achievements({ player }){
  const earned = Object.keys(player.achievements||{}).length;
  const total = ACHIEVEMENTS.length;
  return (
    <details className="mt-8 glass rounded-2xl p-4" open>
      <summary className="cursor-pointer flex items-center gap-2 select-none">
        <span className="text-lg">🏅</span>
        <span className="font-semibold">Badges</span>
        <span className="text-xs text-white/50 ml-1">{earned}/{total} earned</span>
        <div className="flex-1 h-1.5 rounded-full bg-white/10 overflow-hidden ml-2">
          <div className="h-full bg-gradient-to-r from-violet-500 to-fuchsia-500 transition-all" style={{width:`${Math.round(earned/total*100)}%`}}/>
        </div>
      </summary>
      <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">
        {ACHIEVEMENTS.map(a=>{
          const got = !!player.achievements?.[a.id];
          const earnedAt = player.achievements?.[a.id];
          return (
            <div key={a.id}
              className={`rounded-xl p-3 border flex items-start gap-3 transition
                ${got
                  ? 'border-violet-400/35 bg-violet-500/10 shadow shadow-violet-500/10'
                  : 'border-white/5 bg-white/[0.02]'}`}>
              <span className={`text-2xl leading-none shrink-0 ${got?'':'opacity-40 grayscale'}`}>{a.icon}</span>
              <div className="min-w-0 flex-1">
                <div className="flex items-center gap-1.5 flex-wrap">
                  <div className={`text-sm font-semibold leading-tight ${got?'text-white':'text-white/65'}`}>{a.label}</div>
                  {got
                    ? <span className="text-[10px] text-violet-300/80 bg-violet-500/15 px-1.5 py-0.5 rounded-full">Earned</span>
                    : <span className="text-[10px] text-white/35 bg-white/5 px-1.5 py-0.5 rounded-full">Locked</span>}
                </div>
                <div className={`text-xs mt-0.5 leading-snug ${got?'text-white/65':'text-white/45'}`}>{a.desc}</div>
                {got && <div className="text-[10px] text-white/35 mt-1">Earned {new Date(earnedAt).toLocaleDateString()}</div>}
              </div>
            </div>
          );
        })}
      </div>
      {earned === 0 && (
        <div className="mt-3 text-center text-xs text-white/35 italic">Complete tasks to earn your first badge.</div>
      )}
    </details>
  );
}

/* --------------------------------- Toast ---------------------------------- */
function Toast({ toast }){
  const color = toast.type==='achievement' ? 'from-amber-400 to-fuchsia-500'
              : toast.type==='error'       ? 'from-rose-500 to-red-500'
              : 'from-violet-500 to-fuchsia-500';
  return (
    <div className="fixed bottom-6 left-1/2 z-[60] toast-anim">
      <div className={`modal-pane rounded-xl px-4 py-3 flex items-center gap-3 shadow-2xl`}>
        <div className={`w-2 h-8 rounded-full bg-gradient-to-b ${color}`}/>
        <div>
          <div className="text-sm font-semibold">{toast.title}</div>
          <div className="text-xs text-white/60">{toast.body}</div>
        </div>
      </div>
    </div>
  );
}

/* --------------------------------- Mount ---------------------------------- */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
