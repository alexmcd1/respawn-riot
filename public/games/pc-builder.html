<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --color-text-primary: #ededed;
    --color-text-secondary: #a0a0c8;
    --color-text-tertiary: #6b6b8c;
    --color-text-info: #67e8f9;
    --color-text-success: #86efac;
    --color-text-warning: #fcd34d;
    --color-text-danger: #fca5a5;
    --color-background-primary: #0a0a14;
    --color-background-secondary: #14141f;
    --color-background-tertiary: #1c1c2a;
    --color-background-info: rgba(34,211,238,0.12);
    --color-background-success: rgba(34,197,94,0.15);
    --color-background-warning: rgba(245,158,11,0.15);
    --color-background-danger: rgba(239,68,68,0.15);
    --color-border-primary: rgba(255,255,255,0.30);
    --color-border-secondary: rgba(255,255,255,0.18);
    --color-border-tertiary: rgba(255,255,255,0.10);
    --color-border-info: rgba(34,211,238,0.5);
    --color-border-success: rgba(34,197,94,0.5);
    --color-border-warning: rgba(245,158,11,0.5);
    --color-border-danger: rgba(239,68,68,0.5);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  html, body { background: var(--color-background-primary); color: var(--color-text-primary); }
  body { padding: 16px; max-width: 900px; margin: 0 auto; }
  button {
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 8px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover:not(:disabled) { background: var(--color-background-tertiary); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  input[type="text"], input[type="search"], .picker-search {
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 6px 10px;
    font-family: inherit;
  }
</style>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);color:var(--color-text-primary);background:transparent;}

.compat-banner.ok{background:var(--color-background-success);color:var(--color-text-success);}
.compat-banner.warn{background:var(--color-background-warning);color:var(--color-text-warning);}

.parts-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}

.part-header:hover{background:var(--color-background-secondary);}
.part-icon{width:32px;height:32px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.part-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:1px;}
.part-selected{font-size:13px;font-weight:500;flex:1;}
.part-price{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-right:6px;}
.expand-icon{font-size:14px;color:var(--color-text-tertiary);transition:transform 0.2s;}
.expand-icon.open{transform:rotate(180deg);}
.part-picker{border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);padding:10px 12px;}
.picker-search{width:100%;margin-bottom:10px;font-size:13px;}
.picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px;max-height:220px;overflow-y:auto;}
.picker-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 11px;cursor:pointer;transition:border-color 0.15s;}
.picker-card:hover{border-color:var(--color-border-primary);}
.picker-card.active{border:2px solid var(--color-border-info);background:var(--color-background-info);}

    <button onclick="clearBuild()"><i class="ti ti-trash" style="font-size:14px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>Clear build</button>
    <button onclick="exportBuild()"><i class="ti ti-copy" style="font-size:14px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>Copy build summary</button>
  </div>
</div>

const PART_META = {
  cpu:{label:'CPU',icon:'ti-cpu'},
  motherboard:{label:'Motherboard',icon:'ti-circuit-board'},
  ram:{label:'RAM',icon:'ti-server'},
  gpu:{label:'GPU',icon:'ti-device-desktop'},
  storage:{label:'Storage',icon:'ti-database'},
  psu:{label:'Power supply',icon:'ti-bolt'},
  cooler:{label:'CPU cooler',icon:'ti-wind'},
  case:{label:'Case',icon:'ti-box'},
};

const PERF_BENCHMARKS = [
  {label:'1080p gaming',key:'gaming'},
  {label:'1440p gaming',key:'gaming14'},
  {label:'4K gaming',key:'gaming4k'},
  {label:'Content creation',key:'prod'},
  {label:'Streaming',key:'stream'},
];

const PRESETS = {
  budget:{cpu:'r5-5600',motherboard:'b550m',ram:'ddr4-16-3200',gpu:'rx6600',storage:'ssd-1tb',psu:'psu-550',cooler:'hyper212',case:'case-budget'},
  mid:{cpu:'i5-12600k',motherboard:'z690',ram:'ddr4-32-3600',gpu:'rtx4060ti',storage:'ssd-2tb',psu:'psu-750',cooler:'aio-240',case:'case-mid'},
  high:{cpu:'r7-7700x',motherboard:'b650',ram:'ddr5-32-6000',gpu:'rx7900xt',storage:'ssd-2tb',psu:'psu-850',cooler:'aio-360',case:'case-meshify'},
  ultra:{cpu:'r9-7950x',motherboard:'x670e',ram:'ddr5-64-5600',gpu:'rtx4090',storage:'ssd-4tb',psu:'psu-1200',cooler:'aio-420',case:'case-ultra'},
};

let build = {cpu:null,motherboard:null,ram:null,gpu:null,storage:null,psu:null,cooler:null,case:null};
let openSection = null;
let searches = {};

function getPartById(cat, id){ return PARTS_DB[cat].find(p=>p.id===id)||null; }

function applyPreset(name){
  const p = PRESETS[name];
  Object.keys(p).forEach(cat=>{ build[cat]=p[cat]; });
  openSection=null;
  render();
}

function clearBuild(){
  Object.keys(build).forEach(k=>build[k]=null);
  openSection=null;
  render();
}

function totalCost(){
  return Object.keys(build).reduce((sum,cat)=>{
    const part = build[cat]?getPartById(cat,build[cat]):null;
    return sum + (part?part.price:0);
  },0);
}

function getCompatIssues(){
  const issues=[];
  const cpu = build.cpu?getPartById('cpu',build.cpu):null;
  const mb = build.motherboard?getPartById('motherboard',build.motherboard):null;
  const ram = build.ram?getPartById('ram',build.ram):null;
  if(cpu&&mb&&cpu.socket!==mb.socket) issues.push({type:'err',msg:`Socket mismatch: ${cpu.name} (${cpu.socket}) is not compatible with ${mb.name} (${mb.socket}).`});
  if(mb&&ram&&mb.ddr!==ram.ddr) issues.push({type:'err',msg:`RAM type mismatch: ${mb.name} requires ${mb.ddr}, but ${ram.name} is ${ram.ddr}.`});
  const totalTdp = (cpu?cpu.tdp:0)+(build.gpu?getPartById('gpu',build.gpu)?.tdp||0:0);
  const psu = build.psu?getPartById('psu',build.psu):null;
  if(psu&&totalTdp>0&&psu.wattage<totalTdp+100) issues.push({type:'warn',msg:`PSU may be underpowered. Estimated draw ~${totalTdp}W, PSU is ${psu.wattage}W. Recommended: ${totalTdp+150}W+.`});
  if(cpu&&cpu.tdp>95&&build.cooler==='stock') issues.push({type:'warn',msg:`${cpu.name} (${cpu.tdp}W TDP) may thermal-throttle with a stock cooler. Consider an aftermarket cooler.`});
  return issues;
}

function calcScores(){
  const cpu=build.cpu?getPartById('cpu',build.cpu):null;
  const gpu=build.gpu?getPartById('gpu',build.gpu):null;
  const ram=build.ram?getPartById('ram',build.ram):null;
  if(!cpu&&!gpu) return null;
  const cpuG=cpu?cpu.gaming:0, gpuG=gpu?gpu.gaming:0;
  const cpuP=cpu?cpu.prod:0, gpuP=gpu?gpu.prod:0;
  const gaming=Math.round(gpuG*0.7+cpuG*0.3);
  const gaming14=Math.round(gaming*0.82);
  const gaming4k=Math.round(gaming*0.62);
  const prod=Math.round(cpuP*0.65+gpuP*0.35);
  const stream=Math.round(cpuP*0.55+gpuP*0.25+(ram&&ram.capacity>=32?15:0));
  const totalTdp=(cpu?cpu.tdp:0)+(gpu?gpu.tdp:0);
  return {gaming,gaming14,gaming4k,prod,stream,totalTdp};
}

function barColor(v){
  if(v>=80) return 'green';
  if(v>=50) return '';
  if(v>=30) return 'amber';
  return 'red';
}

function render(){
  const cost=totalCost();
  const pill=document.getElementById('total-pill');
  pill.textContent='$'+cost.toLocaleString();
  pill.className='total-pill'+(cost>0?' ok':'');

  const scores=calcScores();
  const partsCount=Object.values(build).filter(Boolean).length;
  document.getElementById('score-gaming').textContent=scores?scores.gaming+'/100':'—';
  document.getElementById('score-prod').textContent=scores?scores.prod+'/100':'—';
  const totalTdp=(build.cpu?getPartById('cpu',build.cpu)?.tdp||0:0)+(build.gpu?getPartById('gpu',build.gpu)?.tdp||0:0);
  document.getElementById('score-tdp').textContent=totalTdp||'—';
  document.getElementById('score-psu').textContent=totalTdp?totalTdp+150:'—';
  document.getElementById('score-parts').textContent=partsCount+'/8';

  const issues=getCompatIssues();
  const banner=document.getElementById('compat-banner');
  const bannerText=document.getElementById('compat-text');
  const errs=issues.filter(i=>i.type==='err');
  const warns=issues.filter(i=>i.type==='warn');
  if(errs.length){banner.className='compat-banner err';bannerText.textContent=errs.map(i=>i.msg).join(' | ');}
  else if(warns.length){banner.className='compat-banner warn';bannerText.textContent=warns.map(i=>i.msg).join(' | ');}
  else if(partsCount===8){banner.className='compat-banner ok';bannerText.textContent='All parts compatible! Build looks great.';}
  else{banner.className='compat-banner ok';bannerText.textContent='Select components to check compatibility.';}

  const perfEl=document.getElementById('perf-bars');
  if(scores){
    perfEl.innerHTML=PERF_BENCHMARKS.map(b=>{
      const v=scores[b.key]||0;
      return `<div class="perf-row">
        <span class="perf-lbl">${b.label}</span>
        <div class="perf-bar-bg"><div class="perf-bar ${barColor(v)}" style="width:${v}%"></div></div>
        <span class="perf-val">${v}</span>
      </div>`;
    }).join('');
  } else {
    perfEl.innerHTML='<div style="font-size:13px;color:var(--color-text-secondary);padding:8px 0;">Select a CPU and GPU to see performance estimates.</div>';
  }

  const list=document.getElementById('parts-list');
  list.innerHTML='';
  Object.keys(PART_META).forEach(cat=>{
    const meta=PART_META[cat];
    const selectedId=build[cat];
    const part=selectedId?getPartById(cat,selectedId):null;
    const isOpen=openSection===cat;

    const row=document.createElement('div');
    row.className='part-row';

    const header=document.createElement('div');
    header.className='part-header';
    header.innerHTML=`
      <div class="part-icon"><i class="ti ${meta.icon}" aria-hidden="true"></i></div>
      <div style="flex:1;min-width:0;">
        <div class="part-label">${meta.label}</div>
        <div class="part-selected" style="${!part?'color:var(--color-text-tertiary);font-weight:400':''}">
          ${part?part.name:'Click to select...'}
        </div>
      </div>
      ${part?`<span class="part-price">$${part.price}</span>`:''}
      <i class="ti ti-chevron-down expand-icon ${isOpen?'open':''}" aria-hidden="true"></i>
    `;
    header.onclick=()=>{ openSection=isOpen?null:cat; render(); };
    row.appendChild(header);

    if(isOpen){
      const picker=document.createElement('div');
      picker.className='part-picker';
      const searchVal=searches[cat]||'';
      picker.innerHTML=`<input class="picker-search" type="text" placeholder="Search ${meta.label.toLowerCase()}..." value="${searchVal}" id="search-${cat}">
        <div class="picker-grid" id="grid-${cat}"></div>`;
      row.appendChild(picker);

      const grid=picker.querySelector(`#grid-${cat}`);
      const filtered=PARTS_DB[cat].filter(p=>!searchVal||p.name.toLowerCase().includes(searchVal.toLowerCase())||p.spec.toLowerCase().includes(searchVal.toLowerCase()));

      filtered.forEach(p=>{
        const card=document.createElement('div');
        card.className='picker-card'+(selectedId===p.id?' active':'');
        const issues=getCompatIssuesForPart(cat,p);
        card.innerHTML=`<div class="pc-name">${p.name}${issues.length?`<span class="pc-badge warn">!</span>`:''}</div>
          <div class="pc-spec">${p.spec}</div>
          <div class="pc-price">$${p.price}${p.price===0?' (free)':''}</div>`;
        card.onclick=(e)=>{
          e.stopPropagation();
          build[cat]=(selectedId===p.id)?null:p.id;
          openSection=null;
          render();
        };
        grid.appendChild(card);
      });

      setTimeout(()=>{
        const inp=document.getElementById('search-'+cat);
        if(inp){ inp.focus(); inp.oninput=e=>{ searches[cat]=e.target.value; render(); }; }
      },10);
    }
    list.appendChild(row);
  });
}

function getCompatIssuesForPart(cat,part){
  const issues=[];
  if(cat==='motherboard'&&build.cpu){
    const cpu=getPartById('cpu',build.cpu);
    if(cpu&&cpu.socket!==part.socket) issues.push('socket');
  }
  if(cat==='ram'&&build.motherboard){
    const mb=getPartById('motherboard',build.motherboard);
    if(mb&&mb.ddr!==part.ddr) issues.push('ddr');
  }
  if(cat==='cpu'&&build.motherboard){
    const mb=getPartById('motherboard',build.motherboard);
    if(mb&&mb.socket!==part.socket) issues.push('socket');
  }
  return issues;
}

function getBuildSummary(){
  const lines=Object.keys(build).map(cat=>{
    const part=build[cat]?getPartById(cat,build[cat]):null;
    return `${PART_META[cat].label}: ${part?part.name+' ($'+part.price+')':'Not selected'}`;
  });
  lines.push('Total: $'+totalCost().toLocaleString());
  return lines.join(', ');
}

function exportBuild(){
  const lines=['=== PC Build Summary ===',''];
  Object.keys(build).forEach(cat=>{
    const part=build[cat]?getPartById(cat,build[cat]):null;
    lines.push(`${PART_META[cat].label}: ${part?part.name+' — $'+part.price:'Not selected'}`);
  });
  lines.push('');lines.push('Total: $'+totalCost().toLocaleString());
  const scores=calcScores();
  if(scores){lines.push('');lines.push('Estimated gaming score: '+scores.gaming+'/100');lines.push('Estimated productivity score: '+scores.prod+'/100');}
  try{navigator.clipboard.writeText(lines.join('\n'));}catch(e){}
  const btn=event.target.closest('button');
  if(btn){const orig=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=orig,1500);}
}

render();
</script>

</body>
</html>
